<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>CalorieTracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #0b0b0b;
      --s1:      #111111;
      --s2:      #181818;
      --border:  #252525;
      --text:    #eeeeec;
      --muted:   #555555;
      --dim:     #2a2a2a;
      --p:       #85b098;
      --c:       #7fa4b8;
      --f:       #b89e72;
      --danger:  #b87272;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    .mono { font-family: 'JetBrains Mono', monospace; }
    input, textarea, button, select { font-family: 'Outfit', sans-serif; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    textarea:focus, input:focus { outline: none; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    @keyframes fadeUp { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:none; } }
    @keyframes pulse  { 0%,100% { opacity:1; } 50% { opacity:.4; } }
    .fade-up { animation: fadeUp .2s ease; }

    .card {
      background: var(--s1);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
    }

    .field {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      padding: 10px 12px;
      font-size: 13px;
      transition: border-color .2s;
    }
    .field:focus { border-color: var(--text); }

    .btn {
      width: 100%;
      background: var(--text);
      color: var(--bg);
      border: none;
      border-radius: 10px;
      padding: 11px;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      transition: opacity .15s;
      letter-spacing: .01em;
    }
    .btn:hover:not(:disabled) { opacity: .8; }
    .btn:disabled { opacity: .25; cursor: default; }
    .btn.loading { animation: pulse 1s infinite; background: var(--s2); color: var(--muted); }
    .btn.success { background: var(--p); color: var(--bg); }

    .tab {
      flex: 1;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      padding: 11px 4px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      color: var(--muted);
      transition: all .15s;
      letter-spacing: .01em;
    }
    .tab.on { color: var(--text); border-bottom-color: var(--text); }

    .logcard {
      background: var(--s1);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 11px 13px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
      animation: fadeUp .2s ease;
    }

    .tag {
      font-size: 10px;
      border-radius: 5px;
      padding: 2px 6px;
      font-family: 'JetBrains Mono', monospace;
    }

    a { color: var(--c); }
  </style>
</head>
<body>
<div id="app"></div>
<script type="module">
import { h, render, Fragment } from 'https://esm.sh/preact@10.24.3';
import { useState, useEffect, useRef } from 'https://esm.sh/preact@10.24.3/hooks';
import htm from 'https://esm.sh/htm@3.1.1';
const html = htm.bind(h);

// ── Storage helpers ─────────────────────────────────────────────────────────
const TODAY = () => new Date().toISOString().slice(0, 10);
const jget = (k, fb) => { try { const v = localStorage.getItem(k); return v !== null ? JSON.parse(v) : fb; } catch { return fb; } };
const jset = (k, v) => localStorage.setItem(k, JSON.stringify(v));
const getKey = () => localStorage.getItem('ct_key') || '';
const setKey = v => localStorage.setItem('ct_key', v);
function loadLog() { const d = jget('ct_log', {}); return d.date === TODAY() ? d.items || [] : []; }
function saveLog(log) { jset('ct_log', { date: TODAY(), items: log }); }
const DEFAULT_GOALS = { calorieën: 2800, eiwitten: 150, koolhydraten: 200, vetten: 65 };
const SYSTEM = `Je bent een voedingsdeskundige. Geef ALLEEN valide JSON terug, geen tekst eromheen:
{"items":[{"naam":"naam","hoeveelheid":"bijv. 200g","calorieën":0,"eiwitten":0,"koolhydraten":0,"vetten":0}],"bericht":"kort vriendelijk Nederlands bericht"}
Gebruik realistische gemiddelde portiewaarden. ALLEEN JSON, niets anders.`;

// ── Ring ────────────────────────────────────────────────────────────────────
function Ring({ value, goal, label, color }) {
  const r = 26, c = 2 * Math.PI * r, pct = Math.min(value / goal, 1), over = value > goal;
  return html`
    <div style="text-align:center">
      <svg width="68" height="68">
        <circle cx="34" cy="34" r=${r} fill="none" stroke="#1c1c1c" stroke-width="5"/>
        <circle cx="34" cy="34" r=${r} fill="none"
          stroke=${over ? 'var(--danger)' : color} stroke-width="5"
          stroke-dasharray="${c * pct} ${c}" stroke-linecap="round"
          transform="rotate(-90 34 34)"
          style="transition:stroke-dasharray .5s ease"/>
        <text x="34" y="31" text-anchor="middle" fill="#eeeeec" font-size="11" font-weight="600" font-family="'JetBrains Mono',monospace">${Math.round(value)}</text>
        <text x="34" y="44" text-anchor="middle" fill="#555" font-size="9" font-family="'JetBrains Mono',monospace">/${goal}</text>
      </svg>
      <div style="font-size:10px;color:var(--muted);margin-top:-3px">${label}</div>
    </div>`;
}

// ── LogCard ─────────────────────────────────────────────────────────────────
function LogCard({ item, onRemove }) {
  return html`
    <div class="logcard">
      <div style="flex:1;min-width:0">
        <div style="font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${item.naam}</div>
        <div style="color:var(--muted);font-size:11px;margin-top:2px">${item.hoeveelheid}</div>
        <div style="display:flex;gap:5px;margin-top:7px;flex-wrap:wrap">
          ${[['E', item.eiwitten,'var(--p)'], ['K', item.koolhydraten,'var(--c)'], ['V', item.vetten,'var(--f)']].map(([l,v,col]) => html`
            <span class="tag" style="color:${col};background:${col}1a">${l} ${Math.round(v)}g</span>`)}
        </div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div class="mono" style="font-size:17px;font-weight:600">${Math.round(item.calorieën)}</div>
        <div style="color:var(--muted);font-size:9px">kcal</div>
      </div>
      <button onClick=${onRemove}
        style="background:none;border:none;color:var(--dim);cursor:pointer;font-size:18px;padding:2px 4px;flex-shrink:0;line-height:1;transition:color .15s"
        onMouseOver=${e => e.currentTarget.style.color='var(--danger)'}
        onMouseOut=${e => e.currentTarget.style.color='var(--dim)'}>×</button>
    </div>`;
}

// ── SearchResult ─────────────────────────────────────────────────────────────
function SearchResult({ product, onAdd }) {
  const [qty, setQty] = useState(100);
  const [done, setDone] = useState(false);
  const n = product.nutriments, f = qty / 100;
  const cal = Math.round((n['energy-kcal_100g'] || 0) * f);
  const add = () => { onAdd(product, qty); setDone(true); setTimeout(() => setDone(false), 1600); };
  return html`
    <div class="card fade-up">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
        <div style="flex:1;min-width:0">
          <div style="font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${product.product_name}</div>
          ${product.brands && html`<div style="color:var(--muted);font-size:11px;margin-top:2px">${product.brands}</div>`}
          <div style="display:flex;gap:5px;margin-top:7px;flex-wrap:wrap">
            ${[['E',(n['proteins_100g']||0)*f,'var(--p)'],['K',(n['carbohydrates_100g']||0)*f,'var(--c)'],['V',(n['fat_100g']||0)*f,'var(--f)']].map(([l,v,col]) => html`
              <span class="tag" style="color:${col};background:${col}1a">${l} ${Math.round(v)}g</span>`)}
          </div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div class="mono" style="font-size:17px;font-weight:600">${cal}</div>
          <div style="color:var(--muted);font-size:9px">kcal</div>
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-top:10px;align-items:center">
        <span style="font-size:11px;color:var(--muted)">Hoeveel:</span>
        <input type="number" value=${qty} onInput=${e => setQty(Number(e.target.value))} min="1"
          class="mono field" style="width:60px;padding:5px 8px;text-align:center;font-size:12px"/>
        <span style="font-size:11px;color:var(--muted)">g</span>
        <button onClick=${add} style="margin-left:auto;background:${done?'var(--p)':'var(--s2)'};color:${done?'var(--bg)':'var(--text)'};border:1px solid var(--border);border-radius:8px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap">
          ${done ? '✓ Toegevoegd' : '+ Voeg toe'}
        </button>
      </div>
    </div>`;
}

// ── App ─────────────────────────────────────────────────────────────────────
function App() {
  const [log,     setLog]     = useState(loadLog);
  const [goals,   setGoals]   = useState(() => jget('ct_goals', DEFAULT_GOALS));
  const [key,     setKeyState]= useState(getKey);
  const [tab,     setTab]     = useState('ai');

  const [aiInput,   setAiInput]   = useState('');
  const [aiLoading, setAiLoading] = useState(false);
  const [aiBericht, setAiBericht] = useState('');
  const [aiError,   setAiError]   = useState('');

  const [sq,      setSq]      = useState('');
  const [sResults,setSResults]= useState([]);
  const [sLoad,   setSLoad]   = useState(false);
  const [sError,  setSError]  = useState('');

  const [gDraft,  setGDraft]  = useState(goals);
  const [kSaved,  setKSaved]  = useState(false);
  const [gSaved,  setGSaved]  = useState(false);

  const aiRef = useRef();

  useEffect(() => saveLog(log), [log]);

  const totals = log.reduce((a,i) => ({
    calorieën:   a.calorieën   + i.calorieën,
    eiwitten:    a.eiwitten    + i.eiwitten,
    koolhydraten:a.koolhydraten+ i.koolhydraten,
    vetten:      a.vetten      + i.vetten,
  }), { calorieën:0, eiwitten:0, koolhydraten:0, vetten:0 });

  const addItems = items => setLog(p => [...p, ...items.map(i => ({ ...i, id: Date.now() + Math.random() }))]);

  // Gemini call
  const aiSend = async () => {
    const k = getKey();
    if (!aiInput.trim() || aiLoading) return;
    if (!k) { setAiError('Voer eerst je Gemini API key in via Instellingen.'); return; }
    setAiLoading(true); setAiError(''); setAiBericht('');
    const msg = aiInput.trim(); setAiInput('');
    try {
      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${k}`,
        { method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({
            system_instruction: { parts:[{ text: SYSTEM }] },
            contents: [{ role:'user', parts:[{ text: msg }] }],
            generationConfig: { maxOutputTokens: 2048 }
          }) }
      );
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      const text = data.candidates?.[0]?.content?.parts?.map(p => p.text||'').join('') || '';
      const clean = text.replace(/```json|```/g, '').trim();
      const jsonStart = clean.indexOf('{');
      const jsonEnd = clean.lastIndexOf('}');
      if (jsonStart === -1 || jsonEnd === -1) throw new Error('Geen geldige JSON ontvangen. Probeer een kortere beschrijving.');
      const parsed = JSON.parse(clean.slice(jsonStart, jsonEnd + 1));
      addItems(parsed.items || []);
      setAiBericht(parsed.bericht || '');
    } catch(e) {
      setAiError('Fout: ' + (e.message || 'Probeer opnieuw.'));
    } finally {
      setAiLoading(false);
      setTimeout(() => aiRef.current?.focus(), 50);
    }
  };

  // Open Food Facts
  const search = async () => {
    if (!sq.trim() || sLoad) return;
    setSLoad(true); setSError(''); setSResults([]);
    try {
      const res = await fetch(`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(sq)}&search_simple=1&action=process&json=1&page_size=10&lc=nl&cc=nl&fields=product_name,brands,nutriments`);
      const data = await res.json();
      const prods = (data.products||[]).filter(p => p.product_name && p.nutriments?.['energy-kcal_100g']);
      if (!prods.length) setSError('Geen resultaten. Probeer een andere zoekterm.');
      setSResults(prods.slice(0, 6));
    } catch { setSError('Zoekfout. Controleer je verbinding.'); }
    finally { setSLoad(false); }
  };

  const addOFF = (product, qty) => {
    const n = product.nutriments, f = qty/100;
    addItems([{ naam: product.product_name, hoeveelheid:`${qty}g`,
      calorieën:(n['energy-kcal_100g']||0)*f, eiwitten:(n['proteins_100g']||0)*f,
      koolhydraten:(n['carbohydrates_100g']||0)*f, vetten:(n['fat_100g']||0)*f }]);
  };

  const calPct = Math.min(totals.calorieën / goals.calorieën, 1);
  const calOver = totals.calorieën > goals.calorieën;

  return html`<div>

    <!-- ── Header ── -->
    <div style="background:var(--s1);border-bottom:1px solid var(--border);padding:16px;position:sticky;top:0;z-index:20">
      <div style="max-width:480px;margin:0 auto">

        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
          <div>
            <div style="font-size:16px;font-weight:700;letter-spacing:-.3px">CalorieTracker</div>
            <div style="font-size:11px;color:var(--muted);margin-top:1px">
              ${new Date().toLocaleDateString('nl-NL',{weekday:'long',day:'numeric',month:'long'})}
            </div>
          </div>
          <button onClick=${()=>{setLog([]);setAiBericht('');}}
            style="background:none;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:5px 11px;font-size:11px;cursor:pointer;transition:all .15s"
            onMouseOver=${e=>{e.currentTarget.style.color='var(--danger)';e.currentTarget.style.borderColor='var(--danger)'}}
            onMouseOut=${e=>{e.currentTarget.style.color='var(--muted)';e.currentTarget.style.borderColor='var(--border)'}}>
            Reset dag
          </button>
        </div>

        <!-- Calorie bar -->
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:6px">
          <span>Calorieën</span>
          <span class="mono" style="color:${calOver?'var(--danger)':'var(--text)'};font-weight:600">
            ${Math.round(totals.calorieën)} / ${goals.calorieën} kcal
          </span>
        </div>
        <div style="background:var(--s2);border-radius:6px;height:4px;overflow:hidden">
          <div style="width:${calPct*100}%;height:100%;background:${calOver?'var(--danger)':'var(--text)'};border-radius:6px;transition:width .5s ease"/>
        </div>

        <!-- Macro rings -->
        <div style="display:flex;justify-content:space-around;margin-top:16px">
          <${Ring} value=${totals.eiwitten}     goal=${goals.eiwitten}     label="Eiwitten"     color="var(--p)"/>
          <${Ring} value=${totals.koolhydraten} goal=${goals.koolhydraten} label="Koolhydraten" color="var(--c)"/>
          <${Ring} value=${totals.vetten}       goal=${goals.vetten}       label="Vetten"       color="var(--f)"/>
        </div>

      </div>
    </div>

    <!-- ── Tabs ── -->
    <div style="background:var(--bg);border-bottom:1px solid var(--border)">
      <div style="max-width:480px;margin:0 auto;display:flex">
        ${[['ai','AI Maaltijd'],['search','Product zoeken'],['settings','Instellingen']].map(([id,lbl]) => html`
          <button class=${'tab'+(tab===id?' on':'')} onClick=${()=>setTab(id)}>${lbl}</button>`)}
      </div>
    </div>

    <!-- ── Content ── -->
    <div style="max-width:480px;margin:0 auto;padding:16px 14px 80px">

      <!-- AI tab -->
      ${tab==='ai' && html`<div>
        <div class="card">
          <textarea ref=${aiRef} value=${aiInput}
            onInput=${e=>setAiInput(e.target.value)}
            onKeyDown=${e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();aiSend();}}}
            placeholder='bijv. "bowl met 150g rijst, 200g kipfilet en geroosterde paprika"'
            rows="3" disabled=${aiLoading}
            class="field" style="resize:none;line-height:1.5;margin-bottom:10px"/>
          <button class=${'btn'+(aiLoading?' loading':'')} onClick=${aiSend} disabled=${aiLoading||!aiInput.trim()}>
            ${aiLoading ? 'Berekenen...' : '+ Toevoegen'}
          </button>
          ${aiError && html`<div style="color:var(--danger);font-size:12px;margin-top:8px;text-align:center">${aiError}</div>`}
        </div>
        ${aiBericht && html`
          <div class="card fade-up" style="border-color:var(--dim);font-size:12px;color:#888;line-height:1.6;margin-bottom:0">
            ${aiBericht}
          </div>`}
      </div>`}

      <!-- Search tab -->
      ${tab==='search' && html`<div>
        <div class="card">
          <div style="display:flex;gap:8px">
            <input value=${sq} onInput=${e=>setSq(e.target.value)}
              onKeyDown=${e=>e.key==='Enter'&&search()}
              placeholder='bijv. "Deka volkoren brood" of "Calvé pindakaas"'
              class="field" style="flex:1"/>
            <button onClick=${search} disabled=${sLoad||!sq.trim()}
              style="background:var(--text);color:var(--bg);border:none;border-radius:10px;padding:10px 16px;font-weight:700;font-size:13px;cursor:pointer;opacity:${sLoad||!sq.trim()?'.3':'1'};white-space:nowrap;flex-shrink:0">
              ${sLoad ? '...' : 'Zoek'}
            </button>
          </div>
          ${sError && html`<div style="color:var(--danger);font-size:12px;margin-top:8px">${sError}</div>`}
        </div>
        ${sResults.map(p => html`<${SearchResult} product=${p} onAdd=${addOFF}/>`)}
      </div>`}

      <!-- Settings tab -->
      ${tab==='settings' && html`<div>
        <div class="card">
          <div style="font-size:12px;font-weight:600;color:#888;margin-bottom:10px">Gemini API Key</div>
          <input type="password" value=${key} onInput=${e=>setKeyState(e.target.value)}
            placeholder="AIza..." class="field" style="margin-bottom:10px"/>
          <button class=${'btn'+(kSaved?' success':'')} onClick=${()=>{
            setKey(key); setKSaved(true); setTimeout(()=>setKSaved(false),2000);
          }}>${kSaved ? '✓ Opgeslagen' : 'API key opslaan'}</button>
          <div style="font-size:11px;color:var(--muted);margin-top:8px;line-height:1.6">
            Gratis key via <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com/apikey</a>
          </div>
        </div>

        <div class="card">
          <div style="font-size:12px;font-weight:600;color:#888;margin-bottom:12px">Dagelijkse doelen</div>
          ${[['calorieën','Calorieën (kcal)'],['eiwitten','Eiwitten (g)'],['koolhydraten','Koolhydraten (g)'],['vetten','Vetten (g)']].map(([k,lbl])=>html`
            <div style="margin-bottom:12px">
              <div style="font-size:11px;color:var(--muted);margin-bottom:5px">${lbl}</div>
              <input type="number" value=${gDraft[k]}
                onInput=${e=>setGDraft(p=>({...p,[k]:Number(e.target.value)}))}
                class="field mono"/>
            </div>`)}
          <button class=${'btn'+(gSaved?' success':'')} onClick=${()=>{
            setGoals(gDraft); jset('ct_goals',gDraft); setGSaved(true); setTimeout(()=>setGSaved(false),2000);
          }}>${gSaved ? '✓ Opgeslagen' : 'Doelen opslaan'}</button>
        </div>
      </div>`}

      <!-- Log (altijd zichtbaar) -->
      ${log.length > 0 && html`
        <div style="margin-top:20px">
          <div style="font-size:11px;color:var(--dim);margin-bottom:10px">
            Vandaag — ${log.length} item${log.length!==1?'s':''}
          </div>
          ${[...log].reverse().map(item => html`
            <${LogCard} key=${item.id} item=${item}
              onRemove=${()=>setLog(p=>p.filter(i=>i.id!==item.id))}/>`)}
        </div>`}

      ${log.length===0 && tab!=='settings' && html`
        <div style="text-align:center;color:var(--border);padding:44px 20px;font-size:13px">
          <div style="font-size:30px;margin-bottom:10px">🍽</div>
          Nog niets gelogd vandaag
        </div>`}

    </div>
  </div>`;
}

render(html`<${App}/>`, document.getElementById('app'));
</script>
</body>
</html>
