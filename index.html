<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>CalorieTracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #0b0b0b;
      --s1:      #111111;
      --s2:      #181818;
      --border:  #252525;
      --text:    #eeeeec;
      --muted:   #555555;
      --dim:     #2a2a2a;
      --p:       #85b098;
      --c:       #7fa4b8;
      --f:       #b89e72;
      --danger:  #b87272;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    .mono { font-family: 'JetBrains Mono', monospace; }
    input, textarea, button, select { font-family: 'Outfit', sans-serif; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    textarea:focus, input:focus { outline: none; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    @keyframes fadeUp    { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:none; } }
    @keyframes pulse     { 0%,100% { opacity:1; } 50% { opacity:.4; } }
    @keyframes spin      { to { transform: rotate(360deg); } }
    @keyframes scanline  { 0%,100% { top: 20%; } 50% { top: 75%; } }
    @keyframes slideUp   { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @keyframes backdropIn { from { opacity:0; } to { opacity:1; } }
    .fade-up   { animation: fadeUp .2s ease; }
    .slide-up  { animation: slideUp .28s cubic-bezier(.32,.72,0,1); }
    .card { background: var(--s1); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 12px; }
    .field { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text); padding: 10px 12px; font-size: 13px; transition: border-color .2s; }
    .field:focus { border-color: var(--text); }
    .btn { width: 100%; background: var(--text); color: var(--bg); border: none; border-radius: 10px; padding: 11px; font-weight: 700; font-size: 13px; cursor: pointer; transition: opacity .15s; letter-spacing: .01em; }
    .btn:hover:not(:disabled) { opacity: .8; }
    .btn:disabled { opacity: .25; cursor: default; }
    .btn.success { background: var(--p); color: var(--bg); }
    .tab { flex: 1; background: none; border: none; border-bottom: 2px solid transparent; padding: 11px 4px; font-size: 12px; font-weight: 500; cursor: pointer; color: var(--muted); transition: all .15s; letter-spacing: .01em; }
    .tab.on { color: var(--text); border-bottom-color: var(--text); }
    .logcard { background: var(--s1); border: 1px solid var(--border); border-radius: 12px; padding: 11px 13px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; animation: fadeUp .2s ease; }
    .tag { font-size: 10px; border-radius: 5px; padding: 2px 6px; font-family: 'JetBrains Mono', monospace; }
    .section-label { font-size: 10px; font-weight: 600; color: var(--muted); letter-spacing: .06em; text-transform: uppercase; margin-bottom: 8px; }
    a { color: var(--c); }
    .divider { border: none; border-top: 1px solid var(--border); margin: 4px 0 16px; }
    .source-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; padding: 2px 7px; border-radius: 20px; font-family: 'JetBrains Mono', monospace; margin-bottom: 10px; }
    .spinner { width: 14px; height: 14px; border: 2px solid var(--border); border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0; }
    .scanner-overlay { position: fixed; inset: 0; z-index: 100; background: #000; display: flex; flex-direction: column; }
    .scanner-frame { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -60%); width: 240px; height: 160px; pointer-events: none; }
    .scanner-frame::before, .scanner-frame::after { content: ''; position: absolute; width: 30px; height: 30px; border-color: var(--p); border-style: solid; }
    .scanner-frame::before { top:0;left:0;border-width:3px 0 0 3px;border-radius:4px 0 0 0; }
    .scanner-frame::after  { bottom:0;right:0;border-width:0 3px 3px 0;border-radius:0 0 4px 0; }
    .scanner-frame-tr, .scanner-frame-bl { position: absolute; width: 30px; height: 30px; border-color: var(--p); border-style: solid; }
    .scanner-frame-tr { top:0;right:0;border-width:3px 3px 0 0;border-radius:0 4px 0 0; }
    .scanner-frame-bl { bottom:0;left:0;border-width:0 0 3px 3px;border-radius:0 0 0 4px; }
    .scanner-line { position: absolute; left: 4px; right: 4px; height: 2px; background: linear-gradient(90deg, transparent, var(--p), transparent); animation: scanline 2s ease-in-out infinite; }
    .pill { border-radius: 20px; padding: 5px 12px; font-size: 11px; cursor: pointer; transition: all .15s; font-family: 'JetBrains Mono', monospace; white-space: nowrap; line-height: 1; }
    /* Modal backdrop */
    .modal-backdrop { position: fixed; inset: 0; z-index: 50; background: rgba(0,0,0,.65); backdrop-filter: blur(3px); animation: backdropIn .2s ease; }
    /* Modal bottom sheet */
    .modal-sheet { position: fixed; bottom: 0; left: 0; right: 0; z-index: 51; background: var(--s1); border-radius: 20px 20px 0 0; border: 1px solid var(--border); border-bottom: none; max-height: 85vh; display: flex; flex-direction: column; }
    /* Product row inside modal */
    .product-row { background: var(--s2); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 7px; overflow: hidden; transition: border-color .15s; }
    .product-row.expanded { border-color: var(--c); }
    .product-row-header { display: flex; align-items: center; gap: 10px; padding: 12px 14px; cursor: pointer; user-select: none; }
    .product-row-header:active { background: rgba(255,255,255,.03); }
    .product-row-body { border-top: 1px solid var(--border); padding: 13px 14px; animation: fadeUp .18s ease; }
    /* Drag handle */
    .drag-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 10px auto 0; }
  </style>
</head>
<body>
<div id="app"></div>
<script type="module">
import { h, render } from 'https://esm.sh/preact@10.24.3';
import { useState, useEffect, useRef } from 'https://esm.sh/preact@10.24.3/hooks';
import htm from 'https://esm.sh/htm@3.1.1';
const html = htm.bind(h);

// ── Storage ───────────────────────────────────────────────────────────────────
const TODAY = () => new Date().toISOString().slice(0, 10);
const jget = (k, fb) => { try { const v = localStorage.getItem(k); return v !== null ? JSON.parse(v) : fb; } catch { return fb; } };
const jset = (k, v) => localStorage.setItem(k, JSON.stringify(v));
const getKey = () => localStorage.getItem('ct_key') || '';
const setKey = v => localStorage.setItem('ct_key', v);
function loadLog() { const d = jget('ct_log', {}); return d.date === TODAY() ? d.items || [] : []; }
function saveLog(log) { jset('ct_log', { date: TODAY(), items: log }); }
const loadPresets = () => jget('ct_presets', []);
const savePresets = (presets) => jset('ct_presets', presets);
const DEFAULT_GOALS = { calorieën: 2800, eiwitten: 150, koolhydraten: 200, vetten: 65 };

// ── Qty extractor ─────────────────────────────────────────────────────────────
const QTY_RE = /^(\d+(?:[.,]\d+)?)\s*(g|gr|gram|kg|ml|l|liter|stuks?|st|x)?\s*/i;
function extractQty(raw) {
  const m = raw.trim().match(QTY_RE);
  if (!m) return { qty: null, clean: raw.trim() };
  const qty = parseFloat(m[1].replace(',', '.'));
  const clean = raw.trim().slice(m[0].length).trim();
  return { qty: qty || null, clean: clean || raw.trim() };
}

// ── Serving size parser ───────────────────────────────────────────────────────
function parseServingSize(raw) {
  if (!raw) return null;
  let m = raw.match(/\((\d+(?:[.,]\d+)?)\s*(?:g|ml)\)/i);
  if (m) return parseFloat(m[1].replace(',', '.'));
  m = raw.match(/(?:^|\s)(\d+(?:[.,]\d+)?)\s*(?:g|ml)\b/i);
  if (m) return parseFloat(m[1].replace(',', '.'));
  return null;
}

// ── AI prompts ─────────────────────────────────────────────────────────────────
const NUTRITION_SYSTEM = `Je bent een voedingsdeskundige. Geef ALLEEN valide JSON:
{"items":[{"naam":"naam","hoeveelheid":"bijv. 200g","calorieën":0,"eiwitten":0,"koolhydraten":0,"vetten":0}],"bericht":"kort vriendelijk Nederlands bericht"}
Gebruik realistische gemiddelde portiewaarden. ALLEEN JSON, niets anders.`;

// ── Gemini ────────────────────────────────────────────────────────────────────
const MODELS = ['gemini-2.5-flash', 'gemini-2.0-flash', 'gemini-2.0-flash-lite'];
const MODEL_LIMITS = {
  'gemini-2.5-flash':      { rpm: 360, tpm: 1_000_000, rpd: 1500 },
  'gemini-2.0-flash':      { rpm: 10,  tpm: 1_000_000, rpd: 1500 },
  'gemini-2.0-flash-lite': { rpm: 30,  tpm: 1_000_000, rpd: 1500 },
};
const sleep = ms => new Promise(r => setTimeout(r, ms));
const MAX_RETRIES = 3;

const callGemini = async (systemText, userText, maxTokens = 1000) => {
  const k = getKey();
  if (!k) throw new Error('Voer eerst je Gemini API key in via Instellingen.');
  for (const model of MODELS) {
    // ═══ CONTROLE LIMIETEN ═══
    if (!rateLimitTracker.canMakeRequest(model)) {
      // Ga naar volgende model als deze over limiet zit
      continue;
    }

    for (let attempt = 0; attempt < MAX_RETRIES; attempt++) {
      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${k}`,
        { method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            system_instruction: { parts: [{ text: systemText }] },
            contents: [{ role: 'user', parts: [{ text: userText }] }],
            generationConfig: { maxOutputTokens: maxTokens }
          }) }
      );
      const data = await res.json();
      const overloaded = data.error?.code === 429
        || data.error?.status === 'RESOURCE_EXHAUSTED'
        || data.error?.status === 'UNAVAILABLE';
      if (overloaded) { await sleep(1000 * Math.pow(2, attempt)); continue; }
      if (data.error) throw new Error(data.error.message);

      // ═══ GEBRUIK LOGGEN ═══
      const tokens = data.usageMetadata?.totalTokenCount ?? 0;
      rateLimitTracker.logUsage(model, tokens);

      return data;
    }
  }
  throw new Error('API is overbelast of alle modellen hebben hun limiet bereikt. Probeer het later opnieuw.');
};

const parseGeminiJson = (data) => {
  const text = data.candidates?.[0]?.content?.parts?.map(p => p.text || '').join('') || '';
  const clean = text.replace(/```json|```/g, '').trim();
  const start = clean.indexOf('{'), end = clean.lastIndexOf('}');
  if (start === -1 || end === -1) throw new Error('Geen geldige JSON ontvangen.');
  return JSON.parse(clean.slice(start, end + 1));
};

// ── Rate Limit Tracker ─────────────────────────────────────────────────────
const USAGE_KEY = 'ct_usage';

const getUsageLog = () => {
  try { return JSON.parse(localStorage.getItem(USAGE_KEY)) || []; } catch { return []; }
};
const setUsageLog = (log) => localStorage.setItem(USAGE_KEY, JSON.stringify(log));

const cleanLog = (log, maxAgeMs) => {
  const now = Date.now();
  return log.filter(e => (now - e.ts) < maxAgeMs);
};

const rateLimitTracker = {
  canMakeRequest(model) {
    const limits = MODEL_LIMITS[model];
    if (!limits) return true; // onbekend model, geen beperking
    const now = Date.now();
    let log = getUsageLog();

    // opruimen
    log = cleanLog(log, 24 * 60 * 60 * 1000); // ouder dan 1 dag weg
    const minuteLog = cleanLog(log, 60_000);  // laatste minuut
    const dayLog = cleanLog(log, 24 * 60 * 60 * 1000);

    const rpmUsed = minuteLog.filter(e => e.model === model).length;
    const rpdUsed = dayLog.filter(e => e.model === model).length;
    const tpmUsed = minuteLog
      .filter(e => e.model === model)
      .reduce((sum, e) => sum + (e.tokens || 0), 0);

    if (rpmUsed >= limits.rpm) return false;
    if (rpdUsed >= limits.rpd) return false;
    if (tpmUsed >= limits.tpm) return false;
    return true;
  },

  logUsage(model, tokens) {
    const log = getUsageLog();
    log.push({ model, tokens: tokens || 0, ts: Date.now() });
    // bewaar alleen de laatste 24 uur om localStorage niet te laten exploderen
    const cleaned = cleanLog(log, 24 * 60 * 60 * 1000);
    setUsageLog(cleaned);
  },

  getStats() {
    const now = Date.now();
    const log = getUsageLog();
    const minuteLog = cleanLog(log, 60_000);
    const dayLog = cleanLog(log, 24 * 60 * 60 * 1000);

    // Tel per model en overall
    const stats = { rpm: {}, rpd: {}, tpm: {} };
    for (const model of Object.keys(MODEL_LIMITS)) {
      stats.rpm[model] = minuteLog.filter(e => e.model === model).length;
      stats.rpd[model] = dayLog.filter(e => e.model === model).length;
      stats.tpm[model] = minuteLog
        .filter(e => e.model === model)
        .reduce((sum, e) => sum + (e.tokens || 0), 0);
    }
    return stats;
  },

  reset() {
    setUsageLog([]);
  }
};

// Polyfill voor oudere Safari (< 17.4)
if (!AbortSignal.any) {
  AbortSignal.any = function(...signals) {
    const controller = new AbortController();
    const onAbort = () => {
      controller.abort();
      for (const s of signals) {
        if (s) s.removeEventListener('abort', onAbort);
      }
    };
    for (const s of signals) {
      if (!s) continue;
      if (s.aborted) {
        controller.abort();
        break;
      }
      s.addEventListener('abort', onAbort, { once: true });
    }
    return controller.signal;
  };
}
  
// ── OFF ───────────────────────────────────────────────────────────────────────
const timedFetch = (url, signal, ms = 20000) => {
  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), ms);

  // Combineer de externe signal met onze lokale
  const combinedSignal = signal
    ? AbortSignal.any([signal, controller.signal])
    : controller.signal;

  return fetch(url, { signal: combinedSignal }).finally(() => clearTimeout(timeoutId));
};

const getKcal100g = (n) => n['energy-kcal_100g'] ?? (n['energy_100g'] != null ? n['energy_100g'] / 4.184 : 0);

const SEARCH_CACHE_KEY = 'ct_search_cache';
const CACHE_TTL_MS = 2 * 60 * 60 * 1000; // 2 uur

const getCachedResults = (term) => {
  try {
    const cache = JSON.parse(localStorage.getItem(SEARCH_CACHE_KEY) || '{}');
    const entry = cache[term.toLowerCase()];
    if (!entry) return null;
    if (Date.now() - entry.ts > CACHE_TTL_MS) return null;
    return entry.results;
  } catch { return null; }
};

const setCachedResults = (term, results) => {
  try {
    const cache = JSON.parse(localStorage.getItem(SEARCH_CACHE_KEY) || '{}');
    cache[term.toLowerCase()] = { results, ts: Date.now() };
    localStorage.setItem(SEARCH_CACHE_KEY, JSON.stringify(cache));
  } catch {}
};

const NL_EN = {
  walnoten:'walnuts', amandelen:'almonds', hazelnoten:'hazelnuts',
  cashewnoten:'cashews', pindas:'peanuts', rozijnen:'raisins',
  havermout:'oatmeal', kwark:'quark', melk:'milk', boter:'butter',
  kaas:'cheese', eieren:'eggs', kip:'chicken', rijst:'rice',
  brood:'bread', honing:'honey', suiker:'sugar', bloem:'flour',
  aardappelen:'potatoes', tomaten:'tomatoes', uien:'onions',
  wortelen:'carrots', spinazie:'spinach', zalm:'salmon', tonijn:'tuna',
  chocolade:'chocolate', noten:'nuts', spek:'bacon', worst:'sausage'
};

const searchALicious = async (q, signal, size = 50) => {
  const cached = getCachedResults(q);
  if (cached) return cached;

  const seen = new Set();
  const allProducts = [];

  const addProducts = (hits) => {
    for (const p of hits) {
      if (!p || !p.product_name || !p.nutriments) continue;
      const key = (p.product_name + (p.brands || '')).toLowerCase();
      if (seen.has(key)) continue;
      seen.add(key);
      allProducts.push(p);
    }
  };

  const doSearch = async (term, extra = '') => {
    if (signal?.aborted) return;
    const url =
      `https://off-proxy.mightygamer500.workers.dev/search` +
      `?q=${encodeURIComponent(term)}` +
      `&fields=product_name,brands,nutriments,serving_size` +
      `&page_size=${size}` +
      `&langs=nl,en` +
      `&sort_by=unique_scans_n` +
      extra;
    try {
      const res = await timedFetch(url, signal, 6000);
      if (!res.ok) return;
      const data = await res.json();
      if (data.hits) addProducts(data.hits);
    } catch (e) {}
  };

  // Stap 1 – directe zoekopdracht
  await doSearch(q);

  // Stap 2 – meerdere woorden: ook per woord zoeken als niets gevonden
  if (allProducts.length === 0 && q.includes(' ') && !signal?.aborted) {
    const words = q.split(' ').filter(w => w.length >= 3);
    await Promise.allSettled(words.map(w => doSearch(w)));
  }

  // Stap 3 – Nederlandse vertaling als fallback
  if (allProducts.length === 0 && !signal?.aborted) {
    const words = q.toLowerCase().split(' ');
    const translated = words.map(w => NL_EN[w] || w).join(' ');
    if (translated !== q.toLowerCase()) await doSearch(translated);
  }

  if (allProducts.length > 0) setCachedResults(q, allProducts);
  return allProducts;
};

const offBarcode = async (barcode, signal) => {
  const hasNutriments = (product) => product && product.nutriments;
  const isValid = (data) =>
    (data.status === 1 || data.status === 'success' || data.status_verbose === 'product found') &&
    hasNutriments(data.product);

  // V3
  try {
    const res = await timedFetch(
      `https://world.openfoodfacts.org/api/v3/product/${barcode}?fields=product_name,brands,nutriments,serving_size`,
      signal
    );
    const data = await res.json();
    if (isValid(data)) return data.product;
  } catch (e) {}

  // V2
  try {
    const res = await timedFetch(
      `https://world.openfoodfacts.org/api/v2/product/${barcode}?fields=product_name,brands,nutriments,serving_size`,
      signal
    );
    const data = await res.json();
    if (isValid(data)) return data.product;
  } catch (e) {}

  // V1
  try {
    const res = await timedFetch(
      `https://world.openfoodfacts.org/api/v1/product/${barcode}.json`,
      signal
    );
    const data = await res.json();
    if (isValid(data)) return data.product;
  } catch (e) {}

  // V0
  try {
    const res = await timedFetch(
      `https://world.openfoodfacts.org/api/v0/product/${barcode}.json`,
      signal
    );
    const data = await res.json();
    // V0 heeft vaak status_verbose
    if (isValid(data)) return data.product;
  } catch (e) {}

  return null;
};
// ── Ring ──────────────────────────────────────────────────────────────────────
function Ring({ value, goal, label, color }) {
  const r = 26, c = 2 * Math.PI * r, pct = Math.min(value / goal, 1), over = value > goal;
  return html`
    <div style="text-align:center">
      <svg width="68" height="68">
        <circle cx="34" cy="34" r=${r} fill="none" stroke="#1c1c1c" stroke-width="5"/>
        <circle cx="34" cy="34" r=${r} fill="none" stroke=${over?'var(--danger)':color} stroke-width="5"
          stroke-dasharray="${c*pct} ${c}" stroke-linecap="round" transform="rotate(-90 34 34)"
          style="transition:stroke-dasharray .5s ease"/>
        <text x="34" y="31" text-anchor="middle" fill="#eeeeec" font-size="11" font-weight="600" font-family="'JetBrains Mono',monospace">${Math.round(value)}</text>
        <text x="34" y="44" text-anchor="middle" fill="#555" font-size="9" font-family="'JetBrains Mono',monospace">/${goal}</text>
      </svg>
      <div style="font-size:10px;color:var(--muted);margin-top:-3px">${label}</div>
    </div>`;
}

// ── LogCard ───────────────────────────────────────────────────────────────────
function LogCard({ item, onRemove }) {
  return html`
    <div class="logcard">
      <div style="flex:1;min-width:0">
        <div style="font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${item.naam}</div>
        <div style="color:var(--muted);font-size:11px;margin-top:2px">${item.hoeveelheid}</div>
        <div style="display:flex;gap:5px;margin-top:7px;flex-wrap:wrap">
          ${[['E',item.eiwitten,'var(--p)'],['K',item.koolhydraten,'var(--c)'],['V',item.vetten,'var(--f)']].map(([l,v,col]) => html`
            <span class="tag" style="color:${col};background:${col}1a">${l} ${Math.round(v)}g</span>`)}
        </div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div class="mono" style="font-size:17px;font-weight:600">${Math.round(item.calorieën)}</div>
        <div style="color:var(--muted);font-size:9px">kcal</div>
      </div>
      <button onClick=${onRemove}
        style="background:none;border:none;color:var(--dim);cursor:pointer;font-size:18px;padding:2px 4px;flex-shrink:0;line-height:1;transition:color .15s"
        onMouseOver=${e=>e.currentTarget.style.color='var(--danger)'}
        onMouseOut=${e=>e.currentTarget.style.color='var(--dim)'}>×</button>
    </div>`;
}

// ── ProductRow (modal) ────────────────────────────────────────────────────────
function ProductRow({ product, initialQty, expanded, onToggle, onAdd }) {
  const n = product.nutriments;
  const rawServing = product.serving_size || '';
  const servingGrams = parseServingSize(rawServing);

  const [qty, setQty] = useState(() => initialQty || servingGrams || 100);
  const [done, setDone] = useState(false);

  const f = qty / 100;
  const cal100 = Math.round(getKcal100g(n));
  const cal    = Math.round(getKcal100g(n) * f);

  const MULTIPLIERS  = [1, 2, 3, 5];
  const QUICK_SIZES  = [25, 50, 100, 150, 200];

  const pillStyle = (active) =>
    `background:${active ? 'var(--c)' : 'var(--s1)'};color:${active ? 'var(--bg)' : 'var(--muted)'};border:1px solid ${active ? 'var(--c)' : 'var(--border)'};border-radius:20px;padding:5px 12px;font-size:11px;cursor:pointer;transition:all .15s;font-family:'JetBrains Mono',monospace;white-space:nowrap;line-height:1`;

          <div style="display:flex;gap:4px;align-items:center;flex-shrink:0;margin-right:6px">
            ${[[(n['proteins_100g']||0),'var(--p)'],[(n['carbohydrates_100g']||0),'var(--c)'],[(n['fat_100g']||0),'var(--f)']].map(([v,col]) => html`
              <span style="font-size:9px;color:${col};font-family:'JetBrains Mono',monospace;opacity:.8">${Math.round(v)}</span>`)}
          </div>`}
        <div style="flex-shrink:0;text-align:right;min-width:42px">
          <div class="mono" style="font-size:13px;font-weight:700;color:${expanded?'var(--c)':'var(--text)'}">${cal100}</div>
          <div style="font-size:9px;color:var(--muted)">kcal/100g</div>
        </div>
        <div style="flex-shrink:0;color:var(--muted);font-size:14px;margin-left:4px;transition:transform .2s;transform:rotate(${expanded?'180':'0'}deg)">▾</div>
      </div>

      <!-- Expanded detail -->
      ${expanded && html`
        <div class="product-row-body">

          <!-- Serveergrootte knop -->
          ${servingLabel && html`
            <button onClick=${() => setQty(servingGrams)}
              style="display:inline-flex;align-items:center;gap:5px;background:#85b0981a;border:1px solid #85b09840;border-radius:8px;color:var(--p);font-size:11px;padding:5px 10px;cursor:pointer;margin-bottom:12px;transition:background .15s"
              onMouseOver=${e => e.currentTarget.style.background = '#85b09830'}
              onMouseOut=${e => e.currentTarget.style.background = '#85b0981a'}>
              ↗ ${servingLabel}
            </button>`}

          <!-- Qty input + kcal -->
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:9px">
            <input type="number" value=${qty}
              onInput=${e => setQty(Math.max(1, Number(e.target.value) || 1))}
              min="1" class="mono field"
              style="width:84px;padding:9px 10px;text-align:center;font-size:18px;font-weight:700;flex-shrink:0"/>
            <span style="font-size:12px;color:var(--muted);flex-shrink:0">g / ml</span>
            <div style="margin-left:auto;text-align:right;flex-shrink:0">
              <div class="mono" style="font-size:22px;font-weight:700;line-height:1">${cal}</div>
              <div style="color:var(--muted);font-size:9px;margin-top:2px">kcal</div>
            </div>
          </div>

          <!-- Snelknoppen -->
          <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px">
            ${servingGrams
              ? MULTIPLIERS.map(m => {
                  const v = Math.round(servingGrams * m);
                  return html`<button onClick=${() => setQty(v)} style=${pillStyle(qty === v)}>×${m}</button>`;
                })
              : QUICK_SIZES.map(s => html`<button onClick=${() => setQty(s)} style=${pillStyle(qty === s)}>${s}g</button>`)
            }
          </div>

          <!-- Macro tags -->
          <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px">
            ${[['E',(n['proteins_100g']||0)*f,'var(--p)'],['K',(n['carbohydrates_100g']||0)*f,'var(--c)'],['V',(n['fat_100g']||0)*f,'var(--f)']].map(([l,v,col]) => html`
              <span class="tag" style="color:${col};background:${col}1a">${l} ${Math.round(v)}g</span>`)}
          </div>

          <!-- Voeg toe -->
          <button onClick=${add}
            style="width:100%;background:${done ? 'var(--p)' : 'var(--s1)'};color:${done ? 'var(--bg)' : 'var(--text)'};border:1px solid ${done ? 'var(--p)' : 'var(--border)'};border-radius:10px;padding:11px;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.01em">
            ${done ? '✓ Toegevoegd' : '+ Voeg toe'}
          </button>
        </div>`}
    </div>`;
}

// ── BarcodeScanner ────────────────────────────────────────────────────────────
function BarcodeScanner({ onDetected, onClose }) {
  const videoRef = useRef(null);
  const readerRef = useRef(null);
  const [err, setErr] = useState('');
  const [found, setFound] = useState(null);
  const stopStream = () => {
    try { if (videoRef.current?.srcObject) { videoRef.current.srcObject.getTracks().forEach(t => t.stop()); videoRef.current.srcObject = null; } } catch {}
    try { readerRef.current?.reset(); } catch {}
  };
  useEffect(() => {
    let active = true;
    (async () => {
      try {
        const { BrowserMultiFormatReader } = await import('https://esm.sh/@zxing/browser@0.1.4');
        const reader = new BrowserMultiFormatReader();
        readerRef.current = reader;
        await reader.decodeFromVideoDevice(undefined, videoRef.current, (result) => {
          if (!active || !result) return;
          active = false;
          const code = result.getText();
          stopStream();
          setFound(code);
          setTimeout(() => onDetected(code), 900);
        });
      } catch { if (active) setErr('Kan camera niet openen. Controleer de toestemmingen.'); }
    })();
    return () => { active = false; stopStream(); };
  }, []);
  return html`
    <div class="scanner-overlay">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:16px;z-index:2">
        <div style="color:white;font-size:15px;font-weight:600">Scan barcode</div>
        <button onClick=${()=>{stopStream();onClose();}}
          style="background:rgba(255,255,255,.1);border:none;color:white;width:32px;height:32px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center">×</button>
      </div>
      <div style="position:relative;flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden">
        <video ref=${videoRef} style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:${found?0:1};transition:opacity .2s"/>
        ${!err && !found && html`<div class="scanner-frame"><div class="scanner-frame-tr"/><div class="scanner-frame-bl"/><div class="scanner-line"/></div>`}
        ${found && html`
          <div class="fade-up" style="position:relative;z-index:3;text-align:center">
            <div style="font-size:40px;margin-bottom:12px">✓</div>
            <div style="color:var(--p);font-size:15px;font-weight:700">Barcode gevonden</div>
            <div class="mono" style="color:var(--muted);font-size:12px;margin-top:6px">${found}</div>
          </div>`}
        ${err && html`<div style="position:relative;color:#ff6b6b;font-size:13px;text-align:center;padding:20px;background:rgba(0,0,0,.7);border-radius:10px">${err}</div>`}
      </div>
      <div style="padding:20px;text-align:center;color:#666;font-size:12px">
        ${found ? 'Product wordt opgezocht…' : 'Richt de camera op een barcode van een product'}
      </div>
    </div>`;
}

// ── Meal Builder Modal ────────────────────────────────────────────────────────
function MealBuilderModal({ onClose, onSave }) {
  const [name, setName] = useState('');
  const [items, setItems] = useState([]);
  const [offQuery, setOffQuery] = useState('');
  const [offResults, setOffResults] = useState([]);
  const [offLoading, setOffLoading] = useState(false);
  const [offPhaseMsg, setOffPhaseMsg] = useState('');
  const [offError, setOffError] = useState('');
  const [showSearchModal, setShowSearchModal] = useState(false);
  const [modalLabel, setModalLabel] = useState('');
  const [aiQuery, setAiQuery] = useState('');
  const [aiLoading, setAiLoading] = useState(false);
  const [aiError, setAiError] = useState('');
  const abortOFF = useRef(null);

  const addItem = (product, qty) => {
    const n = product.nutriments, f = qty / 100;
    setItems(p => [...p, {
      naam: product.product_name,
      hoeveelheid: `${qty}g`,
      calorieën: getKcal100g(n)*f,
      eiwitten: (n['proteins_100g']||0)*f,
      koolhydraten: (n['carbohydrates_100g']||0)*f,
      vetten: (n['fat_100g']||0)*f,
      id: Date.now() + Math.random()
    }]);
    setShowSearchModal(false);
    setOffResults([]);
    setOffError('');
  };

  const handleOFFSearch = async () => {
    const q = offQuery.trim();
    if (!q || offLoading) return;
    if (abortOFF.current) abortOFF.current.abort();
    const controller = new AbortController();
    abortOFF.current = controller;
    const { signal } = controller;
    setOffLoading(true);
    setOffError('');
    setOffResults([]);
    setShowSearchModal(false);

    const termen = q.split(',').map(s => s.trim()).filter(Boolean);
    const parsed = termen.map(extractQty);
    const cleans = parsed.map(p => p.clean);
    setModalLabel(cleans.join(', '));
    setOffPhaseMsg('Zoeken in database…');
    try {
      const gevonden = [];
      const mislukt = [];
      let serverError = false;
      for (let i = 0; i < cleans.length; i++) {
        if (signal.aborted) break;
        const { qty } = parsed[i];
        try {
          const prods = await searchALicious(cleans[i], signal, 20);
          if (prods.length) {
            gevonden.push(...prods.map(product => ({ product, qty })));
          } else {
            mislukt.push(termen[i]);
          }
        } catch (e) {
          if (e.name === 'AbortError') throw e;
          mislukt.push(termen[i]);
        }
      }
      const errorMsg = mislukt.length ? `Niet gevonden: ${mislukt.map(t => `"${t}"`).join(', ')}` : '';
      setOffResults(gevonden);
      setOffError(errorMsg);
      if (gevonden.length > 0 || errorMsg) setShowSearchModal(true);
    } catch (e) {
      if (e.name === 'AbortError') return;
      setOffError('Fout: ' + (e.message || 'Probeer opnieuw.'));
      setShowSearchModal(true);
    } finally {
      setOffLoading(false);
      setOffPhaseMsg('');
    }
  };

  const handleAISearch = async () => {
    const q = aiQuery.trim();
    if (!q || aiLoading) return;
    setAiLoading(true);
    setAiError('');
    try {
      const data = await callGemini(NUTRITION_SYSTEM, q, 2048);
      const parsed = parseGeminiJson(data);
      setItems(p => [...p, ...parsed.items.map(i => ({ ...i, id: Date.now() + Math.random() }))]);
      setAiQuery('');
    } catch (e) {
      setAiError('Fout: ' + (e.message || 'Probeer opnieuw.'));
    } finally {
      setAiLoading(false);
    }
  };

  const handleSave = () => {
    if (!name.trim() || items.length === 0) return;
    onSave({ naam: name.trim(), items: items.map(({ id, ...rest }) => rest) });
    onClose();
  };

  const removeItem = (id) => setItems(p => p.filter(i => i.id !== id));

  const totals = items.reduce((a, i) => ({
    calorieën: a.calorieën + i.calorieën,
    eiwitten: a.eiwitten + i.eiwitten,
    koolhydraten: a.koolhydraten + i.koolhydraten,
    vetten: a.vetten + i.vetten,
  }), { calorieën: 0, eiwitten: 0, koolhydraten: 0, vetten: 0 });

  return html`
    <div class="modal-backdrop" onClick=${e => e.target === e.currentTarget && onClose()}>
      <div class="modal-sheet slide-up" style="max-height:90vh;">
        <div class="drag-handle"/>
        <div style="padding:12px 16px 10px;display:flex;justify-content:space-between;align-items:center">
          <div style="font-weight:700;font-size:16px;">Maaltijd samenstellen</div>
          <button onClick=${onClose} style="background:var(--s2);border:1px solid var(--border);color:var(--muted);width:30px;height:30px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center">×</button>
        </div>
        <div style="overflow-y:auto;flex:1;padding:0 16px 24px;">
          <input value=${name} onInput=${e => setName(e.target.value)} placeholder="Naam van de maaltijd" class="field" style="margin-bottom:16px;font-weight:600;font-size:14px;"/>
          <div class="card" style="margin-bottom:12px;">
            <div class="section-label">● Database zoeken</div>
            <div style="display:flex;gap:8px;">
              <input value=${offQuery} onInput=${e => setOffQuery(e.target.value)} onKeyDown=${e => e.key === 'Enter' && handleOFFSearch()} placeholder="bijv. 30g volkoren brood, 2 eieren" class="field" style="flex:1"/>
              <button onClick=${handleOFFSearch} disabled=${offLoading || !offQuery.trim()} style="flex-shrink:0;background:var(--c);color:var(--bg);border:none;border-radius:10px;padding:10px 16px;font-weight:700;font-size:13px;cursor:pointer;">${offLoading ? '...' : 'Zoek'}</button>
            </div>
            ${offLoading && html`<div style="display:flex;align-items:center;gap:8px;margin-top:10px;"><div class="spinner" style="border-top-color:var(--c)"/><span style="font-size:12px;color:var(--muted)">${offPhaseMsg}</span></div>`}
          </div>
          <div class="card" style="margin-bottom:12px;">
            <div class="section-label">✦ Beschrijven met AI</div>
            <div style="display:flex;gap:8px;">
              <input value=${aiQuery} onInput=${e => setAiQuery(e.target.value)} onKeyDown=${e => e.key === 'Enter' && handleAISearch()} placeholder="bijv. 300g groentesoep, 2 eieren…" class="field" style="flex:1"/>
              <button onClick=${handleAISearch} disabled=${aiLoading || !aiQuery.trim()} style="flex-shrink:0;background:var(--f);color:var(--bg);border:none;border-radius:10px;padding:10px 16px;font-weight:700;font-size:13px;cursor:pointer;">${aiLoading ? '...' : 'Schat'}</button>
            </div>
            ${aiLoading && html`<div style="display:flex;align-items:center;gap:8px;margin-top:10px;"><div class="spinner" style="border-top-color:var(--f)"/><span style="font-size:12px;color:var(--muted)">AI schat voedingswaarden…</span></div>`}
            ${aiError && html`<div style="color:var(--danger);font-size:12px;margin-top:8px">${aiError}</div>`}
          </div>
          ${items.length > 0 && html`
            <div style="margin-bottom:8px;font-size:11px;color:var(--dim);">Toegevoegd aan maaltijd — ${items.length} item${items.length!==1?'s':''} · ${Math.round(totals.calorieën)} kcal totaal</div>
            ${items.map(item => html`<${LogCard} key=${item.id} item=${item} onRemove=${() => removeItem(item.id)}/>`)}
          `}
          <button onClick=${handleSave} disabled=${!name.trim() || items.length === 0} class="btn" style="margin-top:8px;background:var(--p);">💾 Maaltijd opslaan</button>
        </div>
        ${showSearchModal && html`<${SearchModal} results=${offResults} query=${modalLabel || offQuery} offError=${offError} onClose=${() => { setShowSearchModal(false); setOffResults([]); setOffError(''); }} onAdd=${addItem} onAIEstimate=${() => { setAiQuery(modalLabel || offQuery); setShowSearchModal(false); setOffResults([]); setOffError(''); }}/>`}
      </div>
    </div>`;
}

  };


const handleSavePreset = () => {
  if (log.length === 0) return;
  const name = prompt('Geef een naam voor deze maaltijd:');
  if (!name || !name.trim()) return;
  const newPreset = {
    naam: name.trim(),
    items: log.map(item => ({
      naam: item.naam,
      hoeveelheid: item.hoeveelheid,
      calorieën: item.calorieën,
      eiwitten: item.eiwitten,
      koolhydraten: item.koolhydraten,
      vetten: item.vetten
    }))
  };
  const updated = [...presets, newPreset];
  setPresets(updated);
  savePresets(updated);
};

const handleLoadPreset = (preset) => {
  addItems(preset.items.map(item => ({ ...item })));
};

const handleDeletePreset = (index) => {
  if (!confirm('Weet je zeker dat je deze maaltijd wilt verwijderen?')) return;
  const updated = presets.filter((_, i) => i !== index);
  setPresets(updated);
  savePresets(updated);
};

const handleSaveMeal = (preset) => {
  const updated = [...presets, preset];
  setPresets(updated);
  savePresets(updated);
};
  
  // ── OFF zoeken ────────────────────────────────────────────────────────────
  const handleOFFSearch = async () => {
    const q = offQuery.trim();
    if (!q || offLoading) return;
    if (abortOFF.current) abortOFF.current.abort();
    const controller = new AbortController();
    abortOFF.current = controller;
    const { signal } = controller;

    setOffLoading(true);
    setOffError('');
    setOffResults([]);
    setShowModal(false);

    const termen = q.split(',').map(s => s.trim()).filter(Boolean);
    const parsed = termen.map(extractQty);
    const cleans = parsed.map(p => p.clean);
    setModalLabel(cleans.join(', '));

    // Totale tijdslimiet van 15 seconden voor de hele zoekopdracht
    const TOTAL_TIMEOUT_MS = 15000;
    let timedOut = false;
    const timeoutId = setTimeout(() => {
      timedOut = true;
      controller.abort(); // breek alle lopende requests af
    }, TOTAL_TIMEOUT_MS);

    try {
      const gevonden = [];
      const mislukt = [];
      const progressMessages = [];
      let serverError = false;

      for (let i = 0; i < cleans.length; i++) {
        if (signal.aborted) break; // stop als timer is verlopen

        const { qty } = parsed[i];
        const term = termen[i];
        
        // Update voortgang: bezig met deze term
        progressMessages.push(`Bezig met "${term}"...`);
        setOffPhaseMsg(progressMessages.join(' · '));

        try {
          const prods = await searchALicious(cleans[i], signal, maxResults);
          if (prods.length > 0) {
            gevonden.push(...prods.map(product => ({ product, qty })));
            progressMessages[progressMessages.length - 1] = `"${term}": ${prods.length} product(en) gevonden`;
          } else {
            mislukt.push(term);
            progressMessages[progressMessages.length - 1] = `"${term}": niets gevonden`;
          }
        } catch (e) {
          if (e.name === 'AbortError') break;
          serverError = true;
          mislukt.push(term);
          progressMessages[progressMessages.length - 1] = `"${term}": fout bij ophalen`;
        }
  

        // Update UI met actuele voortgang
        setOffPhaseMsg(progressMessages.join(' · '));
      }

      clearTimeout(timeoutId);

      // Eindmelding
      let errorMsg = mislukt.length
  ? serverError
    ? `Server tijdelijk niet beschikbaar voor: ${mislukt.map(t=>`"${t}"`).join(', ')} — probeer opnieuw.`
    : `Niet gevonden: ${mislukt.map(t=>`"${t}"`).join(', ')} — controleer de spelling.`
  : '';
      if (timedOut) {
        errorMsg = 'Zoekopdracht gestopt na 15 seconden. ' + (errorMsg || '');
      }

      setOffResults(gevonden);
      setOffError(errorMsg);
      if (gevonden.length > 0 || errorMsg) {
        setShowModal(true);
      }
    } catch (e) {
      clearTimeout(timeoutId);
      if (e.name === 'AbortError') {
        if (timedOut) {
          setOffError('Zoekopdracht gestopt na 15 seconden. Probeer een specifiekere zoekterm.');
          setShowModal(true);
        }
      } else {
        setOffError('Fout: ' + (e.message || 'Probeer opnieuw.'));
        setShowModal(true);
      }
    } finally {
      clearTimeout(timeoutId);
      setOffLoading(false);
      setOffPhaseMsg('');
    }
  };
  // ── AI beschrijven ────────────────────────────────────────────────────────
  const handleAISearch = async () => {
    const q = aiQuery.trim();
    if (!q || aiLoading) return;
    setAiLoading(true);
    setAiError('');
    setAiBericht('');
    try {
      const data   = await callGemini(NUTRITION_SYSTEM, q, 2048);
      const parsed = parseGeminiJson(data);
      addItems(parsed.items || []);
      setAiBericht(parsed.bericht || '');
      setAiQuery('');
    } catch (e) {
      setAiError('Fout: ' + (e.message || 'Probeer opnieuw.'));
    } finally {
      setAiLoading(false);
      setTimeout(() => aiInputRef.current?.focus(), 50);
    }
  };

  // ── Barcode: direct endpoint → tekstzoek fallback ─────────────────────────
  const handleBarcode = async (code) => {
    setScanning(false);
    if (abortOFF.current) abortOFF.current.abort();
    const controller = new AbortController();
    abortOFF.current = controller;
    const { signal } = controller;

    setOffLoading(true);
    setOffPhaseMsg('Barcode opzoeken…');
    setOffError('');
    setOffResults([]);
    setShowModal(false);
    setOffQuery(code);
    setModalLabel(code);

    try {
      const product = await offBarcode(code, signal);

      if (product) {
        setOffResults([{ product, qty: null }]);
        setShowModal(true);
      } else {
        setOffError(`Barcode ${code} niet gevonden in de database.`);
        setShowModal(true);
      }
    } catch (e) {
      if (e.name !== 'AbortError') {
        setOffError('Fout bij opzoeken van barcode.');
        setShowModal(true);
      }
    } finally {
      setOffLoading(false);
      setOffPhaseMsg('');
    }
  };

  const calPct = Math.min(totals.calorieën / goals.calorieën, 1);
  const calOver = totals.calorieën > goals.calorieën;

  return html`<div>
    ${scanning && html`<${BarcodeScanner} onDetected=${handleBarcode} onClose=${()=>setScanning(false)}/>`}
        ${showMealBuilder && html`<${MealBuilderModal} onClose=${() => setShowMealBuilder(false)} onSave=${handleSaveMeal}/>`}

    <!-- Search Modal -->
    ${showModal && html`
      <${SearchModal}
        results=${offResults}
        query=${modalLabel || offQuery}
        offError=${offError}
        onClose=${closeModal}
        onAdd=${addOFF}
        onAIEstimate=${handleAIFromModal}/>`}

    <!-- Header -->
    <div style="background:var(--s1);border-bottom:1px solid var(--border);padding:16px;position:sticky;top:0;z-index:20">
      <div style="max-width:480px;margin:0 auto">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
          <div>
            <div style="font-size:16px;font-weight:700;letter-spacing:-.3px">CalorieTracker</div>
            <div style="font-size:11px;color:var(--muted);margin-top:1px">
              ${new Date().toLocaleDateString('nl-NL',{weekday:'long',day:'numeric',month:'long'})}
            </div>
          </div>
          <button onClick=${()=>{setLog([]);setAiBericht('');setOffResults([]);setOffError('');setAiError('');setShowModal(false);}}
            style="background:none;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:5px 11px;font-size:11px;cursor:pointer;transition:all .15s"
            onMouseOver=${e=>{e.currentTarget.style.color='var(--danger)';e.currentTarget.style.borderColor='var(--danger)'}}
            onMouseOut=${e=>{e.currentTarget.style.color='var(--muted)';e.currentTarget.style.borderColor='var(--border)'}}>
            Reset dag
          </button>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:6px">
          <span>Calorieën</span>
          <span class="mono" style="color:${calOver?'var(--danger)':'var(--text)'};font-weight:600">
            ${Math.round(totals.calorieën)} / ${goals.calorieën} kcal
          </span>
        </div>
        <div style="background:var(--s2);border-radius:6px;height:4px;overflow:hidden">
          <div style="width:${calPct*100}%;height:100%;background:${calOver?'var(--danger)':'var(--text)'};border-radius:6px;transition:width .5s ease"/>
        </div>
        <div style="display:flex;justify-content:space-around;margin-top:16px">
          <${Ring} value=${totals.eiwitten}     goal=${goals.eiwitten}     label="Eiwitten"     color="var(--p)"/>
          <${Ring} value=${totals.koolhydraten} goal=${goals.koolhydraten} label="Koolhydraten" color="var(--c)"/>
          <${Ring} value=${totals.vetten}       goal=${goals.vetten}       label="Vetten"       color="var(--f)"/>
        </div>
      </div>
    </div>

    <!-- Tabs -->
    <div style="background:var(--bg);border-bottom:1px solid var(--border)">
      <div style="max-width:480px;margin:0 auto;display:flex">
        <button class=${'tab'+(tab==='add'?' on':'')} onClick=${()=>setTab('add')}>Toevoegen</button>
        <button class=${'tab'+(tab==='settings'?' on':'')} onClick=${()=>setTab('settings')}
          style="display:flex;align-items:center;justify-content:center;gap:5px">
          Instellingen
          <span style="width:7px;height:7px;border-radius:50%;background:${key?'var(--p)':'var(--danger)'};flex-shrink:0"/>
        </button>
      </div>
    </div>

    <!-- Content -->
    <div style="max-width:480px;margin:0 auto;padding:16px 14px 80px">
      ${tab==='add' && html`<div>

        <!-- OFF zoekbalk -->
        <div class="card">
          <div class="section-label">● Database zoeken</div>
          <div style="font-size:11px;color:var(--dim);margin-bottom:10px;line-height:1.6">
            Zoeken in Open Food Facts. Meerdere producten scheiden met een komma.
          </div>
          <div style="display:flex;gap:8px">
            <button onClick=${()=>setScanning(true)} title="Scan barcode"
              style="flex-shrink:0;width:42px;height:42px;background:var(--s2);border:1px solid var(--border);border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .15s;color:var(--muted)"
              onMouseOver=${e=>{e.currentTarget.style.borderColor='var(--text)';e.currentTarget.style.color='var(--text)'}}
              onMouseOut=${e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.color='var(--muted)'}}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/>
                <path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/>
                <line x1="7" y1="12" x2="7" y2="12.01"/><line x1="17" y1="12" x2="17" y2="12.01"/>
                <line x1="12" y1="7" x2="12" y2="17"/>
              </svg>
            </button>
            <input ref=${offInputRef} value=${offQuery}
              onInput=${e=>setOffQuery(e.target.value)}
              onKeyDown=${e=>e.key==='Enter'&&handleOFFSearch()}
              placeholder="bijv. 30g volkoren brood, 2 eieren"
              class="field" style="flex:1"/>
            <button onClick=${handleOFFSearch} disabled=${offLoading||!offQuery.trim()}
              style="flex-shrink:0;background:var(--c);color:var(--bg);border:none;border-radius:10px;padding:10px 16px;font-weight:700;font-size:13px;cursor:pointer;opacity:${offLoading||!offQuery.trim()?'.3':'1'};white-space:nowrap;transition:opacity .15s">
              ${offLoading ? '...' : 'Zoek'}
            </button>
          </div>
          ${offLoading && html`
            <div style="display:flex;align-items:center;gap:8px;margin-top:10px;padding:4px 0">
              <div class="spinner" style="border-top-color:var(--c)"/>
              <span style="font-size:12px;color:var(--muted)">${offPhaseMsg}</span>
            </div>`}
        </div>

        <hr class="divider"/>

        <!-- AI beschrijving -->
        <div class="card">
          <div class="section-label">✦ Beschrijven met AI</div>
          <div style="font-size:11px;color:var(--dim);margin-bottom:10px;line-height:1.6">
            Voor maaltijden en generieke producten. AI schat de voedingswaarden.
          </div>
          <div style="display:flex;gap:8px">
            <input ref=${aiInputRef} value=${aiQuery}
              onInput=${e=>{ setAiQuery(e.target.value); if(aiBericht||aiError){ setAiBericht(''); setAiError(''); } }}
              onKeyDown=${e=>e.key==='Enter'&&handleAISearch()}
              placeholder="bijv. 300g groentesoep, 2 eieren…"
              class="field" style="flex:1"/>
            <button onClick=${handleAISearch} disabled=${aiLoading||!aiQuery.trim()}
              style="flex-shrink:0;background:var(--f);color:var(--bg);border:none;border-radius:10px;padding:10px 16px;font-weight:700;font-size:13px;cursor:pointer;opacity:${aiLoading||!aiQuery.trim()?'.3':'1'};white-space:nowrap;transition:opacity .15s">
              ${aiLoading ? '...' : 'Schat'}
            </button>
          </div>
          ${aiLoading && html`
            <div style="display:flex;align-items:center;gap:8px;margin-top:10px;padding:4px 0">
              <div class="spinner" style="border-top-color:var(--f)"/>
              <span style="font-size:12px;color:var(--muted)">AI schat voedingswaarden…</span>
            </div>`}
          ${aiError && html`<div style="color:var(--danger);font-size:12px;margin-top:8px">${aiError}</div>`}
          ${aiBericht && html`
            <div class="fade-up" style="margin-top:10px;padding:10px;background:var(--s2);border-radius:10px;border:1px solid var(--dim);font-size:12px;color:#888;line-height:1.6">
              <span style="color:var(--f);margin-right:5px">✦</span>${aiBericht}
            </div>`}
        </div>

        <hr class="divider"/>
        <!-- Mijn Maaltijden -->
        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
            <div class="section-label" style="margin-bottom:0">Mijn maaltijden</div>
            <button onClick=${() => setShowMealBuilder(true)}
              style="background:var(--p);color:var(--bg);border:none;border-radius:8px;padding:4px 10px;font-size:11px;font-weight:600;cursor:pointer;opacity:1;transition:all .15s"
              onMouseOver=${e => e.currentTarget.style.opacity = '0.8'}
              onMouseOut=${e => e.currentTarget.style.opacity = '1'}>
              + Nieuwe maaltijd
            </button>
          </div>
          ${presets.length === 0 && html`
            <div style="font-size:11px;color:var(--dim);text-align:center;padding:10px 0">
              Bewaar je eerste maaltijd
            </div>`}
          ${presets.length > 0 && html`
            <div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:4px">
              ${presets.map((preset, idx) => html`
                <div style="position:relative;flex-shrink:0">
                  <button onClick=${() => handleLoadPreset(preset)}
                    style="background:var(--s2);color:var(--text);border:1px solid var(--border);border-radius:20px;padding:6px 12px;font-size:11px;cursor:pointer;white-space:nowrap;font-family:'JetBrains Mono',monospace;transition:all .15s"
                    onMouseOver=${e => { e.currentTarget.style.background='var(--dim)'; }}
                    onMouseOut=${e => { e.currentTarget.style.background='var(--s2)'; }}>
                    ${preset.naam}
                  </button>
                  <button onClick=${() => handleDeletePreset(idx)}
                    style="position:absolute;top:-6px;right:-6px;background:var(--danger);color:var(--bg);border:none;border-radius:50%;width:18px;height:18px;font-size:12px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0.8;transition:opacity .15s"
                    onMouseOver=${e => e.currentTarget.style.opacity='1'}
                    onMouseOut=${e => e.currentTarget.style.opacity='0.8'}>
                    ×
                  </button>
                </div>`)}
            </div>`}
        </div>
          <hr class="divider"/>

        <!-- Log -->
        ${log.length > 0 && html`
          <div>
            <div style="font-size:11px;color:var(--dim);margin-bottom:10px">
              Vandaag — ${log.length} item${log.length!==1?'s':''}
            </div>
            ${[...log].reverse().map(item => html`
              <${LogCard} key=${item.id} item=${item} onRemove=${()=>setLog(p=>p.filter(i=>i.id!==item.id))}/>`)}
          </div>`}
        ${log.length===0 && html`
          <div style="text-align:center;color:var(--border);padding:44px 20px;font-size:13px">
            <div style="font-size:30px;margin-bottom:10px">🍽</div>
            Nog niets gelogd vandaag
          </div>`}
      </div>`}

      ${tab==='settings' && html`<div>
        <div class="card">
          <div style="font-size:12px;font-weight:600;color:#888;margin-bottom:10px">Gemini API Key</div>
          <div style="display:flex;align-items:center;gap:8px;padding:9px 11px;border-radius:9px;margin-bottom:12px;background:${key?'#85b0981a':'#b872721a'};border:1px solid ${key?'#85b09840':'#b8727240'}">
            <span style="width:7px;height:7px;border-radius:50%;background:${key?'var(--p)':'var(--danger)'};flex-shrink:0"/>
            <span style="font-size:12px;color:${key?'var(--p)':'var(--danger)'}">
              ${key ? 'API key opgeslagen — AI kan voedingswaarden schatten' : 'Geen API key — AI-schatting werkt niet'}
            </span>
          </div>
          <input type="password" value=${key} onInput=${e=>setKeyState(e.target.value)}
            placeholder="AIza..." class="field" style="margin-bottom:10px"/>
          <button class=${'btn'+(kSaved?' success':'')} onClick=${()=>{
            setKey(key); setKSaved(true); setTimeout(()=>setKSaved(false),2000);
          }}>${kSaved ? '✓ Opgeslagen' : 'API key opslaan'}</button>
          <div style="font-size:11px;color:var(--muted);margin-top:8px;line-height:1.6">
            Gratis key via <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com/apikey</a>
          </div>
        </div>
        <div class="card">
          <div style="font-size:12px;font-weight:600;color:#888;margin-bottom:12px">Dagelijkse doelen</div>
          ${[['calorieën','Calorieën (kcal)'],['eiwitten','Eiwitten (g)'],['koolhydraten','Koolhydraten (g)'],['vetten','Vetten (g)']].map(([k,lbl])=>html`
            <div style="margin-bottom:12px">
              <div style="font-size:11px;color:var(--muted);margin-bottom:5px">${lbl}</div>
              <input type="number" value=${gDraft[k]}
                onInput=${e=>setGDraft(p=>({...p,[k]:Number(e.target.value)}))}
                class="field mono"/>
            </div>`)}
          <button class=${'btn'+(gSaved?' success':'')} onClick=${()=>{
            setGoals(gDraft); jset('ct_goals',gDraft); setGSaved(true); setTimeout(()=>setGSaved(false),2000);
          }}>${gSaved ? '✓ Opgeslagen' : 'Doelen opslaan'}</button>
        </div>
        <div class="card">
          <div style="font-size:12px;font-weight:600;color:#888;margin-bottom:12px">API-gebruik (Gemini)</div>
          ${(() => {
            const stats = rateLimitTracker.getStats();
            const totalRPD = Object.values(stats.rpd).reduce((a,b)=>a+b,0);
            const totalTPM = Object.values(stats.tpm).reduce((a,b)=>a+b,0);
            const totalRPM = Object.values(stats.rpm).reduce((a,b)=>a+b,0);
            const maxRPD = 1500, maxTPM = 1000000, maxRPM = 10;

            const barStyle = (used, max) => {
              const pct = Math.min(used / max * 100, 100);
              const over = used >= max;
              return `width:${pct}%;height:100%;background:${over?'var(--danger)':'var(--c)'};border-radius:6px;transition:width .3s`;
            };

            return html`
              <div style="margin-bottom:16px">
                <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:4px">
                  <span>Verzoeken vandaag</span>
                  <span class="mono">${totalRPD} / ${maxRPD}</span>
                </div>
                <div style="background:var(--s2);border-radius:6px;height:4px;overflow:hidden">
                  <div style="${barStyle(totalRPD, maxRPD)}"></div>
                </div>
              </div>
              <div style="margin-bottom:16px">
                <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:4px">
                  <span>Tokens deze minuut</span>
                  <span class="mono">${totalTPM.toLocaleString()} / ${maxTPM.toLocaleString()}</span>
                </div>
                <div style="background:var(--s2);border-radius:6px;height:4px;overflow:hidden">
                  <div style="${barStyle(totalTPM, maxTPM)}"></div>
                </div>
              </div>
              <div style="margin-bottom:4px">
                <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:4px">
                  <span>Verzoeken deze minuut</span>
                  <span class="mono">${totalRPM} / ${maxRPM}</span>
                </div>
                <div style="background:var(--s2);border-radius:6px;height:4px;overflow:hidden">
                  <div style="${barStyle(totalRPM, maxRPM)}"></div>
                </div>
              </div>
              <div style="font-size:10px;color:var(--dim);margin-top:10px;line-height:1.4">
                Gebaseerd op lokale telling. Limieten kunnen afwijken.<br/>
                Bij overschrijding schakelt de app over op een ander model.
              </div>
            `;
          })()}
          <button class="btn" onClick=${() => { rateLimitTracker.reset(); setUsageTick(t => t+1); }}
            style="margin-top:12px;background:var(--dim);color:var(--text);border:1px solid var(--border)">
            Lokale tellers resetten
          </button>
        </div>
        <div class="card">
          <div style="font-size:12px;font-weight:600;color:#888;margin-bottom:12px">Zoekresultaten</div>
          <div style="font-size:11px;color:var(--dim);margin-bottom:10px;line-height:1.4">
            Maximaal aantal producten dat wordt opgehaald uit de database.
          </div>
          <input type="number" value=${maxResults}
            onInput=${e => setMaxResults(Math.max(1, Math.min(200, Number(e.target.value) || 50)))}
            min="1" max="200" class="field mono"
            style="text-align:center;font-size:16px;font-weight:600"/>
          <div style="font-size:10px;color:var(--dim);margin-top:6px">
            Tussen 1 en 200 (standaard 50)
          </div>
        </div>
      </div>`}
    </div>
  </div>`;
}

render(html`<${App}/>`, document.getElementById('app'));
</script>
</body>
</html>
