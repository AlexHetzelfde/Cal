<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>CalorieTracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #0b0b0b;
      --s1:      #111111;
      --s2:      #181818;
      --border:  #252525;
      --text:    #eeeeec;
      --muted:   #555555;
      --dim:     #2a2a2a;
      --p:       #85b098;
      --c:       #7fa4b8;
      --f:       #b89e72;
      --danger:  #b87272;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    .mono { font-family: 'JetBrains Mono', monospace; }
    input, textarea, button, select { font-family: 'Outfit', sans-serif; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    textarea:focus, input:focus { outline: none; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    @keyframes fadeUp    { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:none; } }
    @keyframes pulse     { 0%,100% { opacity:1; } 50% { opacity:.4; } }
    @keyframes spin      { to { transform: rotate(360deg); } }
    @keyframes scanline  { 0%,100% { top: 20%; } 50% { top: 75%; } }
    @keyframes slideUp   { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @keyframes backdropIn { from { opacity:0; } to { opacity:1; } }
    .fade-up   { animation: fadeUp .2s ease; }
    .slide-up  { animation: slideUp .28s cubic-bezier(.32,.72,0,1); }
    .card { background: var(--s1); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 12px; }
    .field { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text); padding: 10px 12px; font-size: 13px; transition: border-color .2s; }
    .field:focus { border-color: var(--text); }
    .btn { width: 100%; background: var(--text); color: var(--bg); border: none; border-radius: 10px; padding: 11px; font-weight: 700; font-size: 13px; cursor: pointer; transition: opacity .15s; letter-spacing: .01em; }
    .btn:hover:not(:disabled) { opacity: .8; }
    .btn:disabled { opacity: .25; cursor: default; }
    .btn.success { background: var(--p); color: var(--bg); }
    .tab { flex: 1; background: none; border: none; border-bottom: 2px solid transparent; padding: 11px 4px; font-size: 12px; font-weight: 500; cursor: pointer; color: var(--muted); transition: all .15s; letter-spacing: .01em; }
    .tab.on { color: var(--text); border-bottom-color: var(--text); }
    .logcard { background: var(--s1); border: 1px solid var(--border); border-radius: 12px; padding: 11px 13px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; animation: fadeUp .2s ease; }
    .tag { font-size: 10px; border-radius: 5px; padding: 2px 6px; font-family: 'JetBrains Mono', monospace; }
    .section-label { font-size: 10px; font-weight: 600; color: var(--muted); letter-spacing: .06em; text-transform: uppercase; margin-bottom: 8px; }
    a { color: var(--c); }
    .divider { border: none; border-top: 1px solid var(--border); margin: 4px 0 16px; }
    .source-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; padding: 2px 7px; border-radius: 20px; font-family: 'JetBrains Mono', monospace; margin-bottom: 10px; }
    .spinner { width: 14px; height: 14px; border: 2px solid var(--border); border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0; }
    .scanner-overlay { position: fixed; inset: 0; z-index: 100; background: #000; display: flex; flex-direction: column; }
    .scanner-frame { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -60%); width: 240px; height: 160px; pointer-events: none; }
    .scanner-frame::before, .scanner-frame::after { content: ''; position: absolute; width: 30px; height: 30px; border-color: var(--p); border-style: solid; }
    .scanner-frame::before { top:0;left:0;border-width:3px 0 0 3px;border-radius:4px 0 0 0; }
    .scanner-frame::after  { bottom:0;right:0;border-width:0 3px 3px 0;border-radius:0 0 4px 0; }
    .scanner-frame-tr, .scanner-frame-bl { position: absolute; width: 30px; height: 30px; border-color: var(--p); border-style: solid; }
    .scanner-frame-tr { top:0;right:0;border-width:3px 3px 0 0;border-radius:0 4px 0 0; }
    .scanner-frame-bl { bottom:0;left:0;border-width:0 0 3px 3px;border-radius:0 0 0 4px; }
    .scanner-line { position: absolute; left: 4px; right: 4px; height: 2px; background: linear-gradient(90deg, transparent, var(--p), transparent); animation: scanline 2s ease-in-out infinite; }
    .pill { border-radius: 20px; padding: 5px 12px; font-size: 11px; cursor: pointer; transition: all .15s; font-family: 'JetBrains Mono', monospace; white-space: nowrap; line-height: 1; }
    .modal-backdrop { position: fixed; inset: 0; z-index: 50; background: rgba(0,0,0,.65); backdrop-filter: blur(3px); animation: backdropIn .2s ease; }
    .modal-sheet { position: fixed; bottom: 0; left: 0; right: 0; z-index: 51; background: var(--s1); border-radius: 20px 20px 0 0; border: 1px solid var(--border); border-bottom: none; max-height: 85vh; display: flex; flex-direction: column; }
    .product-row { background: var(--s2); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 7px; overflow: hidden; transition: border-color .15s; }
    .product-row.expanded { border-color: var(--c); }
    .product-row-header { display: flex; align-items: center; gap: 10px; padding: 12px 14px; cursor: pointer; user-select: none; }
    .product-row-header:active { background: rgba(255,255,255,.03); }
    .product-row-body { border-top: 1px solid var(--border); padding: 13px 14px; animation: fadeUp .18s ease; }
    .drag-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 10px auto 0; }
    .icon-btn { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 10px; width: 42px; height: 42px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; flex-shrink: 0; }
    .icon-btn:hover { border-color: var(--text); color: var(--text); }
  </style>
</head>
<body>
<div id="app"></div>
<script type="module">
import { h, render } from 'https://esm.sh/preact@10.24.3';
import { useState, useEffect, useRef } from 'https://esm.sh/preact@10.24.3/hooks';
import htm from 'https://esm.sh/htm@3.1.1';
const html = htm.bind(h);

// ── Storage ───────────────────────────────────────────────────────────────────
const TODAY = () => new Date().toISOString().slice(0, 10);
const jget = (k, fb) => { try { const v = localStorage.getItem(k); return v !== null ? JSON.parse(v) : fb; } catch { return fb; } };
const jset = (k, v) => localStorage.setItem(k, JSON.stringify(v));
const getKey = () => localStorage.getItem('ct_key') || '';
const setKey = v => localStorage.setItem('ct_key', v);
function loadLog() { const d = jget('ct_log', {}); return d.date === TODAY() ? d.items || [] : []; }
async function saveLog(log) {
  jset('ct_log', { date: TODAY(), items: log });
  const history = await dbGet('ct_food_history', {});
  history[TODAY()] = log;
  await dbSet('ct_food_history', history);
}
const DEFAULT_GOALS = { calorieën: 2800, eiwitten: 150, koolhydraten: 200, vetten: 65 };

// ── IndexedDB wrapper ────────────────────────────────────────────────────────
const DB_NAME = 'CalorieTrackerDB', DB_VERSION = 1;
let dbPromise = null;

function openDB() {
  if (dbPromise) return dbPromise;
  dbPromise = new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('store')) {
        db.createObjectStore('store');
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
  return dbPromise;
}

async function dbGet(key, fallback) {
  try {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction('store', 'readonly');
      const req = tx.objectStore('store').get(key);
      req.onsuccess = () => {
        if (req.result !== undefined) resolve(req.result);
        else resolve(fallback);
      };
      req.onerror = reject;
    });
  } catch { return fallback; }
}

async function dbSet(key, value) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('store', 'readwrite');
    tx.objectStore('store').put(value, key);
    tx.oncomplete = resolve;
    tx.onerror = reject;
  });
}

async function dbDelete(key) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('store', 'readwrite');
    tx.objectStore('store').delete(key);
    tx.oncomplete = resolve;
    tx.onerror = reject;
  });
}

// ── Migreer oude localStorage data naar IndexedDB (éénmalig) ────────────────
async function migrateToIDB() {
  const MIGRATED_KEY = 'ct_migrated_to_idb';
  if (localStorage.getItem(MIGRATED_KEY) === '1') return;
  const pairs = [
    ['ct_custom_exercises', []],
    ['ct_custom_products', []],
    ['ct_presets', []],
    ['ct_workouts', []],
    ['ct_search_cache', {}],
  ];
  for (const [key, fallback] of pairs) {
    const raw = localStorage.getItem(key);
    if (raw) {
      try {
        const val = JSON.parse(raw);
        await dbSet(key, val);
      } catch {}
      localStorage.removeItem(key);
    }
  }
  await dbSet('ct_food_history', {});
  await dbSet('ct_workout_history', {});
  localStorage.setItem(MIGRATED_KEY, '1');
}
migrateToIDB();

// Nieuwe async load/save functies
const loadWorkouts = () => dbGet('ct_workouts', []);
const saveWorkouts = (w) => dbSet('ct_workouts', w);
const loadCustomExercises = () => dbGet('ct_custom_exercises', []);
const saveCustomExercises = (ex) => dbSet('ct_custom_exercises', ex);
const loadPresets = () => dbGet('ct_presets', []);
const savePresets = (p) => dbSet('ct_presets', p);

// ── Image resize helper (houdt localStorage klein) ────────────────────────────
const resizeImage = (dataUrl, maxWidth = 500, maxHeight = 500, quality = 0.75) => {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      let { width, height } = img;
      if (width > maxWidth) { height = Math.round(height * maxWidth / width); width = maxWidth; }
      if (height > maxHeight) { width = Math.round(width * maxHeight / height); height = maxHeight; }
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      canvas.getContext('2d').drawImage(img, 0, 0, width, height);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.onerror = () => resolve(dataUrl);
    img.src = dataUrl;
  });
};

// ── Qty extractor ─────────────────────────────────────────────────────────────
const QTY_RE = /^(\d+(?:[.,]\d+)?)\s*(g|gr|gram|kg|ml|l|liter|stuks?|st|x)?\s*/i;
function extractQty(raw) {
  const m = raw.trim().match(QTY_RE);
  if (!m) return { qty: null, clean: raw.trim() };
  const qty = parseFloat(m[1].replace(',', '.'));
  const clean = raw.trim().slice(m[0].length).trim();
  return { qty: qty || null, clean: clean || raw.trim() };
}

// ── Serving size parser ───────────────────────────────────────────────────────
function parseServingSize(raw) {
  if (!raw) return null;
  let m = raw.match(/\((\d+(?:[.,]\d+)?)\s*(?:g|ml)\)/i);
  if (m) return parseFloat(m[1].replace(',', '.'));
  m = raw.match(/(?:^|\s)(\d+(?:[.,]\d+)?)\s*(?:g|ml)\b/i);
  if (m) return parseFloat(m[1].replace(',', '.'));
  return null;
}

// ── AI prompts ─────────────────────────────────────────────────────────────────
const NUTRITION_SYSTEM = `Je bent een voedingsdeskundige. Geef ALLEEN valide JSON:
{"items":[{"naam":"naam","hoeveelheid":"bijv. 200g","calorieën":0,"eiwitten":0,"koolhydraten":0,"vetten":0}],"bericht":"kort vriendelijk Nederlands bericht"}
Gebruik realistische gemiddelde portiewaarden. ALLEEN JSON, niets anders.`;

// ── Gemini ────────────────────────────────────────────────────────────────────
const MODELS = ['gemini-2.5-flash', 'gemini-2.0-flash', 'gemini-2.0-flash-lite'];
const MODEL_LIMITS = {
  'gemini-2.5-flash':      { rpm: 360, tpm: 1_000_000, rpd: 1500 },
  'gemini-2.0-flash':      { rpm: 10,  tpm: 1_000_000, rpd: 1500 },
  'gemini-2.0-flash-lite': { rpm: 30,  tpm: 1_000_000, rpd: 1500 },
};
const sleep = ms => new Promise(r => setTimeout(r, ms));
const MAX_RETRIES = 3;

const callGemini = async (systemText, userText, maxTokens = 1000) => {
  const k = getKey();
  if (!k) throw new Error('Voer eerst je Gemini API key in via Instellingen.');
  for (const model of MODELS) {
    if (!rateLimitTracker.canMakeRequest(model)) continue;
    for (let attempt = 0; attempt < MAX_RETRIES; attempt++) {
      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${k}`,
        { method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            system_instruction: { parts: [{ text: systemText }] },
            contents: [{ role: 'user', parts: typeof userText === 'string' ? [{ text: userText }] : userText }],
            generationConfig: { maxOutputTokens: maxTokens }
          })
        }
      );
      const data = await res.json();
      const overloaded = data.error?.code === 429 || data.error?.status === 'RESOURCE_EXHAUSTED' || data.error?.status === 'UNAVAILABLE';
      if (overloaded) { await sleep(1000 * Math.pow(2, attempt)); continue; }
      if (data.error) throw new Error(data.error.message);
      const tokens = data.usageMetadata?.totalTokenCount ?? 0;
      rateLimitTracker.logUsage(model, tokens);
      return data;
    }
  }
  throw new Error('API is overbelast of alle modellen hebben hun limiet bereikt. Probeer het later opnieuw.');
};

const parseGeminiJson = (data) => {
  const text = data.candidates?.[0]?.content?.parts?.map(p => p.text || '').join('') || '';
  let clean = text.replace(/```json|```/g, '').trim();
  const start = clean.indexOf('{');
  const end = clean.lastIndexOf('}');
  if (start !== -1 && end !== -1 && end > start) {
    clean = clean.slice(start, end + 1);
    try {
      return JSON.parse(clean);
    } catch {}
  }
  // Als de JSON is afgekapt, probeer te repareren
  if (start !== -1 && (end === -1 || end <= start)) {
    let fixed = clean.slice(start);
    // Sluit eventueel ontbrekende aanhalingstekens
    if (fixed.endsWith('"')) {
      fixed = fixed.slice(0, -1) + '"}';
    } else if (fixed.endsWith(',')) {
      fixed = fixed.slice(0, -1);
    }
    // Voeg ontbrekende } ] } toe
    if (!fixed.endsWith('}')) {
      fixed += '}';
    }
    try {
      return JSON.parse(fixed);
    } catch {}
  }
  throw new Error('Geen geldige JSON ontvangen.');
};

// ── Rate Limit Tracker ─────────────────────────────────────────────────────
const USAGE_KEY = 'ct_usage';
const getUsageLog = () => { try { return JSON.parse(localStorage.getItem(USAGE_KEY)) || []; } catch { return []; } };
const setUsageLog = (log) => localStorage.setItem(USAGE_KEY, JSON.stringify(log));
const cleanLog = (log, maxAgeMs) => { const now = Date.now(); return log.filter(e => (now - e.ts) < maxAgeMs); };

const rateLimitTracker = {
  canMakeRequest(model) {
    const limits = MODEL_LIMITS[model];
    if (!limits) return true;
    let log = getUsageLog();
    log = cleanLog(log, 24 * 60 * 60 * 1000);
    const minuteLog = cleanLog(log, 60_000);
    const dayLog = cleanLog(log, 24 * 60 * 60 * 1000);
    const rpmUsed = minuteLog.filter(e => e.model === model).length;
    const rpdUsed = dayLog.filter(e => e.model === model).length;
    const tpmUsed = minuteLog.filter(e => e.model === model).reduce((sum, e) => sum + (e.tokens || 0), 0);
    if (rpmUsed >= limits.rpm) return false;
    if (rpdUsed >= limits.rpd) return false;
    if (tpmUsed >= limits.tpm) return false;
    return true;
  },
  logUsage(model, tokens) {
    const log = getUsageLog();
    log.push({ model, tokens: tokens || 0, ts: Date.now() });
    setUsageLog(cleanLog(log, 24 * 60 * 60 * 1000));
  },
  getStats() {
    const log = getUsageLog();
    const minuteLog = cleanLog(log, 60_000);
    const dayLog = cleanLog(log, 24 * 60 * 60 * 1000);
    const stats = { rpm: {}, rpd: {}, tpm: {} };
    for (const model of Object.keys(MODEL_LIMITS)) {
      stats.rpm[model] = minuteLog.filter(e => e.model === model).length;
      stats.rpd[model] = dayLog.filter(e => e.model === model).length;
      stats.tpm[model] = minuteLog.filter(e => e.model === model).reduce((sum, e) => sum + (e.tokens || 0), 0);
    }
    return stats;
  },
  reset() { setUsageLog([]); }
};

if (!AbortSignal.any) {
  AbortSignal.any = function(...signals) {
    const controller = new AbortController();
    const onAbort = () => { controller.abort(); for (const s of signals) { if (s) s.removeEventListener('abort', onAbort); } };
    for (const s of signals) {
      if (!s) continue;
      if (s.aborted) { controller.abort(); break; }
      s.addEventListener('abort', onAbort, { once: true });
    }
    return controller.signal;
  };
}

// ── OFF ───────────────────────────────────────────────────────────────────────
const timedFetch = (url, signal, ms = 20000) => {
  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), ms);
  const combinedSignal = signal ? AbortSignal.any([signal, controller.signal]) : controller.signal;
  return fetch(url, { signal: combinedSignal }).finally(() => clearTimeout(timeoutId));
};

const getKcal100g = (n) => n['energy-kcal_100g'] ?? (n['energy_100g'] != null ? n['energy_100g'] / 4.184 : 0);

const SEARCH_CACHE_KEY = 'ct_search_cache';
const CACHE_TTL_MS = 2 * 60 * 60 * 1000;
const CF_USAGE_KEY = 'ct_cf_usage';

const getCFUsage = () => {
  try {
    const data = JSON.parse(localStorage.getItem(CF_USAGE_KEY) || '{}');
    if (data.date !== TODAY()) return { date: TODAY(), count: 0 };
    return data;
  } catch { return { date: TODAY(), count: 0 }; }
};
const incrementCFUsage = () => { const data = getCFUsage(); data.count = (data.count || 0) + 1; localStorage.setItem(CF_USAGE_KEY, JSON.stringify(data)); };

const getCachedResults = async (term) => {
  const cache = await dbGet('ct_search_cache', {});
  const entry = cache[term.toLowerCase()];
  if (!entry) return null;
  if (Date.now() - entry.ts > CACHE_TTL_MS) return null;
  return entry.results;
};
const setCachedResults = async (term, results) => {
  const cache = await dbGet('ct_search_cache', {});
  cache[term.toLowerCase()] = { results, ts: Date.now() };
  await dbSet('ct_search_cache', cache);
};

const NL_EN = {
  walnoten:'walnuts', amandelen:'almonds', hazelnoten:'hazelnuts', cashewnoten:'cashews',
  pindas:'peanuts', rozijnen:'raisins', havermout:'oatmeal', kwark:'quark', melk:'milk',
  boter:'butter', kaas:'cheese', eieren:'eggs', kip:'chicken', rijst:'rice', brood:'bread',
  honing:'honey', suiker:'sugar', bloem:'flour', aardappelen:'potatoes', tomaten:'tomatoes',
  uien:'onions', wortelen:'carrots', spinazie:'spinach', zalm:'salmon', tonijn:'tuna',
  chocolade:'chocolate', noten:'nuts', spek:'bacon', worst:'sausage'
};

function scoreProduct(product, query) {
  if (!product.nutriments) return -1;
  const n = product.nutriments;
  const heeftMacros = getKcal100g(n) > 0 && n['proteins_100g'] != null && n['carbohydrates_100g'] != null && n['fat_100g'] != null;
  if (!heeftMacros) return -1;
  const naam = (product.product_name || '').toLowerCase();
  const merk = Array.isArray(product.brands) ? product.brands.join(', ').toLowerCase() : (product.brands || '').toLowerCase();
  const combined = naam + ' ' + merk;
  const woorden = query.toLowerCase().split(' ').filter(w => w.length >= 2);
  const treffers = woorden.filter(w => combined.includes(w));
  const minMatches = woorden.length >= 3 ? 2 : 1;
  if (treffers.length < minMatches) return -1;
  let score = treffers.length * 10;
  if (naam === query.toLowerCase()) score += 50;
  else if (naam.startsWith(query.toLowerCase())) score += 30;
  if (merk && woorden.some(w => merk.includes(w))) score += 15;
  if (product.serving_size) score += 5;
  return score;
}

const fetchV1Search = async (term, signal, size = 50) => {
  if (signal?.aborted) return [];
  const url = `https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(term)}&json=1&fields=product_name,brands,nutriments,serving_size&page_size=${size}`;
  try {
    const res = await timedFetch(url, signal, 6000);
    if (!res.ok) return [];
    const data = await res.json();
    return (data.products || []).map(p => ({ ...p, brands: Array.isArray(p.brands) ? p.brands.join(', ') : (p.brands || '') }));
  } catch { return []; }
};

const searchALicious = async (q, signal, size = 100, onRequest) => {
  if (!q || q.length < 2) return [];
  const words = q.toLowerCase().split(' ').filter(w => w.length >= 2);
  if (words.length === 0) return [];
  let allProducts = [];
  const fetchSearch = async (term) => {
    if (signal?.aborted) return [];
    const url = `https://off-proxy.mightygamer500.workers.dev/search?q=${encodeURIComponent(term)}&fields=product_name,brands,nutriments,serving_size&page_size=${size}&sort_by=unique_scans_n`;
    try {
      const res = await timedFetch(url, signal, 6000);
      if (!res.ok) return [];
      const data = await res.json();
      if (data.hits) { incrementCFUsage(); onRequest?.(); }
      return data.hits || [];
    } catch { return []; }
  };
  const heeftMacros = (p) => { const n = p.nutriments; return n && getKcal100g(n) > 0 && n['proteins_100g'] != null && n['carbohydrates_100g'] != null && n['fat_100g'] != null; };
  const [hitsSA, hitsV1] = await Promise.all([fetchSearch(q), fetchV1Search(q, signal, size)]);
  if (hitsSA.length) allProducts = [...allProducts, ...hitsSA];
  if (hitsV1.length) allProducts = [...allProducts, ...hitsV1];
  if (allProducts.filter(heeftMacros).length < 3 && !signal?.aborted) {
    for (const w of words) {
      const [sa, v1] = await Promise.all([fetchSearch(w), fetchV1Search(w, signal, size)]);
      if (sa.length) allProducts = [...allProducts, ...sa];
      if (v1.length) allProducts = [...allProducts, ...v1];
    }
  }
  const translatedWords = words.map(w => NL_EN[w] || w).join(' ');
  if (translatedWords !== q && allProducts.filter(heeftMacros).length < 3 && !signal?.aborted) {
    const [sa, v1] = await Promise.all([fetchSearch(translatedWords), fetchV1Search(translatedWords, signal, size)]);
    if (sa.length) allProducts = [...allProducts, ...sa];
    if (v1.length) allProducts = [...allProducts, ...v1];
  }
  const seen = new Set();
  allProducts = allProducts.filter(p => { const key = p.product_name?.toLowerCase(); if (!key || seen.has(key)) return false; seen.add(key); return true; });
  const gesorteerd = allProducts.map(p => ({ p, score: scoreProduct(p, q) })).filter(x => x.score >= 0).sort((a, b) => b.score - a.score).map(x => x.p);
  if (gesorteerd.length > 0) setCachedResults(q, gesorteerd);
  return gesorteerd;
};

const offBarcode = async (barcode, signal) => {
  const hasNutriments = (product) => product && product.nutriments;
  const isValid = (data) => (data.status === 1 || data.status === 'success' || data.status_verbose === 'product found') && hasNutriments(data.product);
  for (const version of ['v3', 'v2', 'v1', 'v0']) {
    try {
      const url = version === 'v0'
        ? `https://world.openfoodfacts.org/api/v0/product/${barcode}.json`
        : `https://world.openfoodfacts.org/api/${version}/product/${barcode}?fields=product_name,brands,nutriments,serving_size`;
      const res = await timedFetch(url, signal);
      const data = await res.json();
      if (isValid(data)) return data.product;
    } catch {}
  }
  return null;
};

const EXERCISE_DB_URL = 'https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/dist/exercises.json';
const IMG_BASE = 'https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/';
let exerciseDB = null;

const loadExerciseDB = async () => {
  if (exerciseDB) return exerciseDB;
  const res = await fetch(EXERCISE_DB_URL);
  exerciseDB = await res.json();
  return exerciseDB;
};

// ── Zoek in zowel de online DB als eigen oefeningen ─────────────────────────
const searchExercises = async (term, customExercises = []) => {
  const q = term.toLowerCase();

  // Eigen oefeningen altijd zoeken (offline, altijd snel)
  const customMatches = customExercises
    .filter(e => e.name.toLowerCase().includes(q))
    .map(e => ({ ...e, isCustom: true }));

  // Online DB
  let dbResults = [];
  try {
    const db = await loadExerciseDB();
    dbResults = db.filter(e => e.name.toLowerCase().includes(q)).slice(0, 8);
  } catch {}

  // Eigen oefeningen eerst tonen
  return [...customMatches, ...dbResults].slice(0, 12);
};

function Ring({ value, goal, label, color }) {
  const r = 26, c = 2 * Math.PI * r, pct = Math.min(value / goal, 1), over = value > goal;
  return html`
    <div style="text-align:center">
      <svg width="68" height="68">
        <circle cx="34" cy="34" r=${r} fill="none" stroke="#1c1c1c" stroke-width="5"/>
        <circle cx="34" cy="34" r=${r} fill="none" stroke=${over?'var(--danger)':color} stroke-width="5"
          stroke-dasharray="${c*pct} ${c}" stroke-linecap="round" transform="rotate(-90 34 34)"
          style="transition:stroke-dasharray .5s ease"/>
        <text x="34" y="31" text-anchor="middle" fill="#eeeeec" font-size="11" font-weight="600" font-family="'JetBrains Mono',monospace">${Math.round(value)}</text>
        <text x="34" y="44" text-anchor="middle" fill="#555" font-size="9" font-family="'JetBrains Mono',monospace">/${goal}</text>
      </svg>
      <div style="font-size:10px;color:var(--muted);margin-top:-3px">${label}</div>
    </div>`;
}

              style="display:inline-flex;align-items:center;gap:5px;background:#85b0981a;border:1px solid #85b09840;border-radius:8px;color:var(--p);font-size:11px;padding:5px 10px;cursor:pointer;margin-bottom:12px;transition:background .15s"

          <div style="display:flex;align-items:center;gap:10px;margin-bottom:9px">

              <div class="mono" style="font-size:22px;font-weight:700;line-height:1">${cal}</div>
              <div style="color:var(--muted);font-size:9px;margin-top:2px">kcal</div>
            </div>
          </div>
          <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px">
            ${servingGrams
              ? MULTIPLIERS.map(m => { const v = Math.round(servingGrams * m); return html`<button onClick=${() => setQty(v)} style=${pillStyle(qty === v)}>×${m}</button>`; })

// ── BarcodeScanner ────────────────────────────────────────────────────────────
function BarcodeScanner({ onDetected, onClose }) {
  const videoRef = useRef(null);
  const readerRef = useRef(null);
  const [err, setErr] = useState('');
  const [found, setFound] = useState(null);
  const stopStream = () => {
    try { if (videoRef.current?.srcObject) { videoRef.current.srcObject.getTracks().forEach(t => t.stop()); videoRef.current.srcObject = null; } } catch {}
    try { readerRef.current?.reset(); } catch {}
  };
  useEffect(() => {
    let active = true;
    (async () => {
      try {
        const { BrowserMultiFormatReader } = await import('https://esm.sh/@zxing/browser@0.1.4');
        const reader = new BrowserMultiFormatReader();
        readerRef.current = reader;
        await reader.decodeFromVideoDevice(undefined, videoRef.current, (result) => {
          if (!active || !result) return;
          active = false;
          const code = result.getText();
          stopStream();
          setFound(code);
          setTimeout(() => onDetected(code), 900);
        });
      } catch { if (active) setErr('Kan camera niet openen. Controleer de toestemmingen.'); }
    })();
    return () => { active = false; stopStream(); };
  }, []);
  return html`
    <div class="scanner-overlay">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:16px;z-index:2">
        <div style="color:white;font-size:15px;font-weight:600">Scan barcode</div>
        <button onClick=${()=>{stopStream();onClose();}} style="background:rgba(255,255,255,.1);border:none;color:white;width:32px;height:32px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center">×</button>
      </div>
      <div style="position:relative;flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden">
        <video ref=${videoRef} style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:${found?0:1};transition:opacity .2s"/>
        ${!err && !found && html`<div class="scanner-frame"><div class="scanner-frame-tr"/><div class="scanner-frame-bl"/><div class="scanner-line"/></div>`}
        ${found && html`<div class="fade-up" style="position:relative;z-index:3;text-align:center"><div style="font-size:40px;margin-bottom:12px">✓</div><div style="color:var(--p);font-size:15px;font-weight:700">Barcode gevonden</div><div class="mono" style="color:var(--muted);font-size:12px;margin-top:6px">${found}</div></div>`}
        ${err && html`<div style="position:relative;color:#ff6b6b;font-size:13px;text-align:center;padding:20px;background:rgba(0,0,0,.7);border-radius:10px">${err}</div>`}
      </div>
      <div style="padding:20px;text-align:center;color:#666;font-size:12px">${found ? 'Product wordt opgezocht…' : 'Richt de camera op een barcode van een product'}</div>
    </div>`;
}

// ── WorkoutBuilder ────────────────────────────────────────────────────────────
function WorkoutBuilder({ onClose, onSave, customExercises = [], editWorkout = null }) {
  const [naam, setNaam] = useState('');
  const [oefeningen, setOefeningen] = useState([]);
  useEffect(() => {
  if (editWorkout) {
    setNaam(editWorkout.naam);
    setOefeningen(editWorkout.oefeningen.map((oe, idx) => ({
      ...oe,
      id: Date.now() + idx + Math.random(), // unieke temp-id’s
    })));
  }
}, [editWorkout]);
  const [zoekterm, setZoekterm] = useState('');
  const [zoekresultaten, setZoekresultaten] = useState([]);
  const [zoeken, setZoeken] = useState(false);

  const handleZoek = async () => {
    if (!zoekterm.trim()) return;
    setZoeken(true);
    setZoekresultaten([]);
    try {
      const results = await searchExercises(zoekterm, customExercises);
      setZoekresultaten(results);
    } catch {}
    finally { setZoeken(false); }
  };

  const voegToe = (exercise) => {
    setZoekresultaten([]);
    setZoekterm('');
    const rawImage = exercise.images?.[0];
    // Eigen oefeningen: rawImage is al een data-URL (begint met "data:")
    // Online DB: rawImage is een bestandsnaam die we samenvoegen met IMG_BASE
    const image = rawImage
      ? (exercise.isCustom || rawImage.startsWith('data:') ? rawImage : IMG_BASE + rawImage)
      : null;
    setOefeningen(prev => [...prev, {
      id: Date.now() + Math.random(),
      naam: exercise.name,
      image,
      isCustom: exercise.isCustom || false,
      sets: 3,
      reps: 10
    }]);
  };

  const voegHandmatigToe = () => {
    if (!zoekterm.trim()) return;
    setOefeningen(prev => [...prev, {
      id: Date.now() + Math.random(),
      naam: zoekterm.trim(),
      image: null,
      isCustom: false,
      sets: 3,
      reps: 10
    }]);
    setZoekterm('');
    setZoekresultaten([]);
  };

  const updateOefening = (id, field, value) => setOefeningen(prev => prev.map(e => e.id === id ? {...e, [field]: value} : e));
  const verwijderOefening = (id) => setOefeningen(prev => prev.filter(e => e.id !== id));

  const handleOpslaan = () => {
  if (!naam.trim() || oefeningen.length === 0) return;
  const workoutData = {
    id: editWorkout ? editWorkout.id : Date.now(),
    naam: naam.trim(),
    aangemaakt: editWorkout ? editWorkout.aangemaakt : new Date().toLocaleDateString('nl-NL'),
    oefeningen: oefeningen.map(({ id, ...rest }) => rest),
  };
  onSave(workoutData, editWorkout ? editWorkout.id : null);
  onClose();
};

  return html`
    <div class="modal-backdrop" onClick=${e => e.target === e.currentTarget && onClose()}>

        </div>
        <div style="overflow-y:auto;flex:1;padding:0 16px 24px">
          <input value=${naam} onInput=${e => setNaam(e.target.value)}
            placeholder="Naam van de workout (bijv. Zaterdag L-sit)"
            class="field" style="margin-bottom:16px;font-weight:600;font-size:14px"/>

          <div class="card" style="margin-bottom:12px">
            <div class="section-label">Oefening toevoegen</div>
            <div style="font-size:11px;color:var(--dim);margin-bottom:10px;line-height:1.5">
              Zoek in de database of je eigen oefeningen. Typ in het Engels voor online resultaten.
            </div>
            <div style="display:flex;gap:8px;margin-bottom:8px">
              <input value=${zoekterm}
                onInput=${e => setZoekterm(e.target.value)}
                onKeyDown=${e => e.key === 'Enter' && handleZoek()}
                placeholder="bijv. pike push, L-sit, planche…"
                class="field" style="flex:1"/>
              <button onClick=${handleZoek} disabled=${zoeken || !zoekterm.trim()}
                style="flex-shrink:0;background:var(--c);color:var(--bg);border:none;border-radius:10px;padding:10px 14px;font-weight:700;font-size:13px;cursor:pointer;opacity:${zoeken||!zoekterm.trim()?'.3':'1'}">
                ${zoeken ? '...' : 'Zoek'}
              </button>
            </div>

            ${zoekresultaten.length > 0 && html`
              <div style="border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:8px">
                ${zoekresultaten.map((r, i) => html`
                  <div onClick=${() => voegToe(r)}
                    style="padding:10px 12px;cursor:pointer;display:flex;align-items:center;gap:10px;border-bottom:${i < zoekresultaten.length-1?'1px solid var(--border)':'none'};transition:background .15s"
                    onMouseOver=${e => e.currentTarget.style.background='var(--s2)'}
                    onMouseOut=${e => e.currentTarget.style.background='transparent'}>
                    ${r.images?.[0] ? html`
                      <img src=${r.isCustom || r.images[0].startsWith('data:') ? r.images[0] : IMG_BASE + r.images[0]}
                        style="width:36px;height:36px;object-fit:cover;border-radius:6px;flex-shrink:0;border:1px solid var(--border)"/>`
                    : html`<div style="width:36px;height:36px;border-radius:6px;background:var(--s1);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">💪</div>`}
                    <div style="flex:1;min-width:0">
                      <div style="font-size:13px;font-weight:600">${r.name}</div>
                      ${r.isCustom && html`<div style="font-size:10px;color:var(--p);margin-top:1px">Eigen oefening</div>`}
                    </div>
                    <div style="font-size:11px;color:var(--muted)">+</div>
                  </div>`)}
              </div>`}

            ${zoekresultaten.length === 0 && zoekterm.trim() && !zoeken && html`
              <button onClick=${voegHandmatigToe}
                style="width:100%;background:var(--s2);border:1px solid var(--border);color:var(--muted);border-radius:10px;padding:9px;font-size:12px;cursor:pointer;transition:all .15s"
                onMouseOver=${e=>{e.currentTarget.style.borderColor='var(--text)';e.currentTarget.style.color='var(--text)'}}
                onMouseOut=${e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.color='var(--muted)'}}>
                + "${zoekterm}" handmatig toevoegen (zonder foto)
              </button>`}
          </div>

          ${oefeningen.length > 0 && html`
            <div style="margin-bottom:12px">
              <div class="section-label">Oefeningen (${oefeningen.length})</div>
              ${oefeningen.map(oe => html`
                <div style="background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px;display:flex;gap:12px;align-items:flex-start">
                  ${oe.image
                    ? html`<img src=${oe.image} style="width:70px;height:70px;object-fit:cover;border-radius:8px;flex-shrink:0;border:1px solid var(--border)"/>`
                    : html`<div style="width:70px;height:70px;border-radius:8px;background:var(--s1);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0">💪</div>`}
                  <div style="flex:1;min-width:0">
                    <div style="font-size:13px;font-weight:600;margin-bottom:2px">${oe.naam}</div>
                    ${oe.isCustom && html`<div style="font-size:10px;color:var(--p);margin-bottom:6px">Eigen oefening</div>`}
                    <div style="display:flex;gap:6px;align-items:center">
                      <div style="flex:1">
                        <div style="font-size:10px;color:var(--muted);margin-bottom:3px">Sets</div>
                        <input type="number" value=${oe.sets} onInput=${e => updateOefening(oe.id, 'sets', Number(e.target.value))} class="field mono" style="padding:6px 8px;text-align:center;font-size:14px;font-weight:700"/>
                      </div>
                      <div style="color:var(--muted);margin-top:12px">×</div>
                      <div style="flex:1">
                        <div style="font-size:10px;color:var(--muted);margin-bottom:3px">Reps</div>
                        <input type="number" value=${oe.reps} onInput=${e => updateOefening(oe.id, 'reps', Number(e.target.value))} class="field mono" style="padding:6px 8px;text-align:center;font-size:14px;font-weight:700"/>
                      </div>
                      <button onClick=${() => verwijderOefening(oe.id)}
                        style="background:none;border:none;color:var(--dim);cursor:pointer;font-size:18px;margin-top:12px;line-height:1;flex-shrink:0;transition:color .15s;padding:4px"

                        onMouseOut=${e => e.currentTarget.style.color='var(--dim)'}>×</button>
                    </div>
                  </div>
                </div>`)}
            </div>`}

          <button onClick=${handleOpslaan} disabled=${!naam.trim() || oefeningen.length === 0} class="btn" style="background:var(--p)">
            💾 Workout opslaan
          </button>
        </div>
      </div>
    </div>`;
}

// ── MealBuilderModal ──────────────────────────────────────────────────────────
function MealBuilderModal({ onClose, onSave, onRequest }) {
  const [name, setName] = useState('');
  const [items, setItems] = useState([]);
  const [offQuery, setOffQuery] = useState('');
  const [offResults, setOffResults] = useState([]);
  const [offLoading, setOffLoading] = useState(false);
  const [offPhaseMsg, setOffPhaseMsg] = useState('');
  const [offError, setOffError] = useState('');
  const [showSearchModal, setShowSearchModal] = useState(false);
  const [modalLabel, setModalLabel] = useState('');
  const [aiQuery, setAiQuery] = useState('');
  const [aiLoading, setAiLoading] = useState(false);
  const [aiError, setAiError] = useState('');
  const abortOFF = useRef(null);

  const addItem = (product, qty) => {
    const n = product.nutriments, f = qty / 100;
    setItems(p => [...p, { naam: product.product_name, hoeveelheid: `${qty}g`, calorieën: getKcal100g(n)*f, eiwitten: (n['proteins_100g']||0)*f, koolhydraten: (n['carbohydrates_100g']||0)*f, vetten: (n['fat_100g']||0)*f, id: Date.now() + Math.random() }]);
    setShowSearchModal(false); setOffResults([]); setOffError('');
  };

  const handleOFFSearch = async () => {
    const q = offQuery.trim();
    if (!q || offLoading) return;
    if (abortOFF.current) abortOFF.current.abort();
    const controller = new AbortController();
    abortOFF.current = controller;
    const { signal } = controller;
    setOffLoading(true); setOffError(''); setOffResults([]); setShowSearchModal(false);
    const termen = q.split(',').map(s => s.trim()).filter(Boolean);
    const parsed = termen.map(extractQty);
    const cleans = parsed.map(p => p.clean);
    setModalLabel(cleans.join(', '));
    setOffPhaseMsg('Zoeken in database…');
    try {
      const gevonden = [], mislukt = [];
      for (let i = 0; i < cleans.length; i++) {
        if (signal.aborted) break;
        const { qty } = parsed[i];
        try {
          const prods = await searchALicious(cleans[i], signal, 100, onRequest);
          if (prods.length) gevonden.push(...prods.map(product => ({ product, qty })));
          else mislukt.push(termen[i]);
        } catch (e) { if (e.name === 'AbortError') throw e; mislukt.push(termen[i]); }
      }
      const errorMsg = mislukt.length ? `Niet gevonden: ${mislukt.map(t=>`"${t}"`).join(', ')}` : '';
      setOffResults(gevonden); setOffError(errorMsg);
      if (gevonden.length > 0 || errorMsg) setShowSearchModal(true);
    } catch (e) {
      if (e.name === 'AbortError') return;
      setOffError('Fout: ' + (e.message || 'Probeer opnieuw.')); setShowSearchModal(true);
    } finally { setOffLoading(false); setOffPhaseMsg(''); }
  };

  const handleAISearch = async () => {
    const q = aiQuery.trim();
    if (!q || aiLoading) return;
    setAiLoading(true); setAiError('');
    try {
      const data = await callGemini(NUTRITION_SYSTEM, q, 2048);
      const parsed = parseGeminiJson(data);
      setItems(p => [...p, ...parsed.items.map(i => ({ ...i, id: Date.now() + Math.random() }))]);
      setAiQuery('');
    } catch (e) { setAiError('Fout: ' + (e.message || 'Probeer opnieuw.')); }
    finally { setAiLoading(false); }
  };

  const handleSave = () => {
    if (!name.trim() || items.length === 0) return;
    onSave({ naam: name.trim(), items: items.map(({ id, ...rest }) => rest) });
    onClose();
  };

  const removeItem = (id) => setItems(p => p.filter(i => i.id !== id));
  const totals = items.reduce((a, i) => ({ calorieën: a.calorieën + i.calorieën, eiwitten: a.eiwitten + i.eiwitten, koolhydraten: a.koolhydraten + i.koolhydraten, vetten: a.vetten + i.vetten }), { calorieën: 0, eiwitten: 0, koolhydraten: 0, vetten: 0 });

  return html`
    <div class="modal-backdrop" onClick=${e => e.target === e.currentTarget && onClose()}>
      <div class="modal-sheet slide-up" style="max-height:90vh">
        <div class="drag-handle"/>
        <div style="padding:12px 16px 10px;display:flex;justify-content:space-between;align-items:center">
          <div style="font-weight:700;font-size:16px">Maaltijd samenstellen</div>
          <button onClick=${onClose} style="background:var(--s2);border:1px solid var(--border);color:var(--muted);width:30px;height:30px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center">×</button>
        </div>
        <div style="overflow-y:auto;flex:1;padding:0 16px 24px">
          <input value=${name} onInput=${e => setName(e.target.value)} placeholder="Naam van de maaltijd" class="field" style="margin-bottom:16px;font-weight:600;font-size:14px"/>
          <div class="card" style="margin-bottom:12px">
            <div class="section-label">● Database zoeken</div>
            <div style="display:flex;gap:8px">
              <input value=${offQuery} onInput=${e => setOffQuery(e.target.value)} onKeyDown=${e => e.key === 'Enter' && handleOFFSearch()} placeholder="bijv. 30g volkoren brood, 2 eieren" class="field" style="flex:1"/>
              <button onClick=${handleOFFSearch} disabled=${offLoading || !offQuery.trim()} style="flex-shrink:0;background:var(--c);color:var(--bg);border:none;border-radius:10px;padding:10px 16px;font-weight:700;font-size:13px;cursor:pointer">${offLoading ? '...' : 'Zoek'}</button>
            </div>
            ${offLoading && html`<div style="display:flex;align-items:center;gap:8px;margin-top:10px"><div class="spinner" style="border-top-color:var(--c)"/><span style="font-size:12px;color:var(--muted)">${offPhaseMsg}</span></div>`}
          </div>
          <div class="card" style="margin-bottom:12px">
            <div class="section-label">✦ Beschrijven met AI</div>
            <div style="display:flex;gap:8px">
              <input value=${aiQuery} onInput=${e => setAiQuery(e.target.value)} onKeyDown=${e => e.key === 'Enter' && handleAISearch()} placeholder="bijv. 300g groentesoep, 2 eieren…" class="field" style="flex:1"/>
              <button onClick=${handleAISearch} disabled=${aiLoading || !aiQuery.trim()} style="flex-shrink:0;background:var(--f);color:var(--bg);border:none;border-radius:10px;padding:10px 16px;font-weight:700;font-size:13px;cursor:pointer">${aiLoading ? '...' : 'Schat'}</button>
            </div>
            ${aiLoading && html`<div style="display:flex;align-items:center;gap:8px;margin-top:10px"><div class="spinner" style="border-top-color:var(--f)"/><span style="font-size:12px;color:var(--muted)">AI schat voedingswaarden…</span></div>`}
            ${aiError && html`<div style="color:var(--danger);font-size:12px;margin-top:8px">${aiError}</div>`}
          </div>
          ${items.length > 0 && html`
            <div style="margin-bottom:8px;font-size:11px;color:var(--dim)">${items.length} item${items.length!==1?'s':''} · ${Math.round(totals.calorieën)} kcal totaal</div>
            ${items.map(item => html`<${LogCard} key=${item.id} item=${item} onRemove=${() => removeItem(item.id)}/>`)}
          `}
          <button onClick=${handleSave} disabled=${!name.trim() || items.length === 0} class="btn" style="margin-top:8px;background:var(--p)">💾 Maaltijd opslaan</button>
        </div>
        ${showSearchModal && html`<${SearchModal} results=${offResults} query=${modalLabel || offQuery} offError=${offError} onClose=${() => { setShowSearchModal(false); setOffResults([]); setOffError(''); }} onAdd=${addItem} onAIEstimate=${() => { setAiQuery(modalLabel || offQuery); setShowSearchModal(false); setOffResults([]); setOffError(''); }}/>`}
      </div>
    </div>`;
}

function NutritionChart() {
  const [history, setHistory] = useState({});
  const [days, setDays] = useState(7);
  useEffect(() => { dbGet('ct_food_history', {}).then(setHistory); }, []);

  const dates = Object.keys(history).sort().slice(-days);
  const calorieData = dates.map(d => {
    const items = history[d] || [];
    return items.reduce((sum, i) => sum + (i.calorieën || 0), 0);
  });
  const maxCal = Math.max(...calorieData, 1);

  return html`
    <div class="card">
      <div class="section-label">Calorieën per dag</div>
      <div style="font-size:11px; color:var(--dim); margin-bottom:12px">Laatste ${days} dagen</div>
      <div style="display:flex; align-items:flex-end; gap:6px; height:120px; padding:0 4px;">
        ${dates.map((d, idx) => {
          const pct = (calorieData[idx] / maxCal) * 100;
          return html`
            <div style="flex:1; display:flex; flex-direction:column; align-items:center; gap:4px;">
              <div style="font-size:10px; color:var(--muted)">${Math.round(calorieData[idx])}</div>
              <div style="width:100%; height:${pct}%; background:var(--p); border-radius:4px 4px 0 0; min-height:2px;"></div>
              <div style="font-size:9px; color:var(--dim)">${d.slice(5)}</div>
            </div>`;
        })}
      </div>
    </div>`;
}

function GymChart({ workouts }) {
  const [history, setHistory] = useState({});
  useEffect(() => { dbGet('ct_workout_history', {}).then(setHistory); }, []);

  const today = new Date();
  const weeks = [];
  for (let w = 0; w < 12; w++) {
    const week = [];
    for (let d = 0; d < 7; d++) {
      const date = new Date(today);
      date.setDate(date.getDate() - (w * 7 + d));
      const key = date.toISOString().slice(0, 10);
      week.push({ key, count: (history[key] || []).length });
    }
    weeks.push(week);
  }
  weeks.reverse(); // nieuwste weken links

  const maxCount = Math.max(...weeks.flat().map(d => d.count), 1);

  return html`
    <div class="card">
      <div class="section-label">Workout activiteit</div>
      <div style="display:flex; gap:3px; overflow-x:auto; padding-bottom:8px;">
        ${weeks.map((week, wi) => html`
          <div style="display:flex; flex-direction:column; gap:3px;">
            ${week.map(day => {
              const intensity = Math.min(day.count / maxCount, 1);
              const color = intensity === 0 ? 'var(--s2)' : `rgba(133,176,152,${0.2 + intensity * 0.8})`;
              return html`<div title="${day.key}: ${day.count} sessies" style="width:12px; height:12px; border-radius:2px; background:${color}; border:1px solid var(--border);"></div>`;
            })}
          </div>`
        )}
      </div>
      <div style="font-size:10px; color:var(--dim); margin-top:8px;">Hoe groener, hoe meer sessies</div>
    </div>`;
}

    try {
      const gevonden = [], mislukt = [], progressMessages = [];
      let serverError = false;
      for (let i = 0; i < cleans.length; i++) {
        if (signal.aborted) break;

            </button>
          </div>
          ${offLoading && html`<div style="display:flex;align-items:center;gap:8px;margin-top:10px;padding:4px 0"><div class="spinner" style="border-top-color:var(--c)"/><span style="font-size:12px;color:var(--muted)">${offPhaseMsg}</span></div>`}
        </div>

        <hr class="divider"/>

        <!-- AI beschrijving -->
        <div class="card" style="border-top:2px solid #b89e7235">
          <div class="section-label" style="color:var(--f)">✦ Beschrijven met AI</div>
          <div style="font-size:11px;color:var(--dim);margin-bottom:10px;line-height:1.6">Voor maaltijden en generieke producten. AI schat de voedingswaarden.</div>
          <div style="display:flex;gap:8px;align-items:center">
            <input type="file" accept="image/*" capture="environment" style="display:none" ref=${fileInputRef} onChange=${handleFileUpload}/>
            <button class="icon-btn" onClick=${() => fileInputRef.current.click()} title="Foto toevoegen" style="flex-shrink:0">📷</button>
            <input ref=${aiInputRef} value=${aiQuery} onInput=${e=>{ setAiQuery(e.target.value); if(aiBericht||aiError){ setAiBericht(''); setAiError(''); } }} onKeyDown=${e=>e.key==='Enter'&&handleAISearch()} placeholder="bijv. 300g groentesoep, 2 eieren…" class="field" style="flex:1"/>
            <button onClick=${handleAISearch} disabled=${aiLoading||!aiQuery.trim()} style="flex-shrink:0;background:var(--f);color:var(--bg);border:none;border-radius:10px;padding:10px 16px;font-weight:700;font-size:13px;cursor:pointer;opacity:${aiLoading||!aiQuery.trim()?'.3':'1'};white-space:nowrap">
              ${aiLoading ? '...' : 'Schat'}
            </button>
          </div>
          ${uploadedImage && html`<div style="margin-top:8px;font-size:11px;color:var(--muted)">📎 Foto geselecteerd</div>`}
          ${aiLoading && html`<div style="display:flex;align-items:center;gap:8px;margin-top:10px;padding:4px 0"><div class="spinner" style="border-top-color:var(--f)"/><span style="font-size:12px;color:var(--muted)">AI schat voedingswaarden…</span></div>`}
          ${aiError && html`<div style="color:var(--danger);font-size:12px;margin-top:8px">${aiError}</div>`}
          ${aiBericht && html`<div class="fade-up" style="margin-top:10px;padding:10px;background:var(--s2);border-radius:10px;border:1px solid var(--dim);font-size:12px;color:#888;line-height:1.6"><span style="color:var(--f);margin-right:5px">✦</span>${aiBericht}</div>`}
        </div>

        <hr class="divider"/>

        <!-- Bibliotheek -->
        <div class="card">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
            <div style="display:flex;gap:6px">
              <button onClick=${() => setLibTab('maaltijden')} style="padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;border:1px solid ${libTab==='maaltijden'?'var(--p)':'var(--border)'};background:${libTab==='maaltijden'?'var(--p)':'transparent'};color:${libTab==='maaltijden'?'var(--bg)':'var(--muted)'}">
                Maaltijden${presets.length > 0 ? ` (${presets.length})` : ''}
              </button>
              <button onClick=${() => setLibTab('producten')} style="padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;border:1px solid ${libTab==='producten'?'var(--c)':'var(--border)'};background:${libTab==='producten'?'var(--c)':'transparent'};color:${libTab==='producten'?'var(--bg)':'var(--muted)'}">
                Producten${customProducts.length > 0 ? ` (${customProducts.length})` : ''}
              </button>
            </div>
            ${libTab === 'maaltijden'
              ? html`<button onClick=${() => setShowMealBuilder(true)} style="background:var(--p);color:var(--bg);border:none;border-radius:8px;padding:5px 11px;font-size:11px;font-weight:700;cursor:pointer">+ Nieuw</button>`
              : html`<button onClick=${() => setShowAddProduct(true)} style="background:var(--c);color:var(--bg);border:none;border-radius:8px;padding:5px 11px;font-size:11px;font-weight:700;cursor:pointer">+ Nieuw</button>`}
          </div>

          ${libTab === 'maaltijden' && html`<div>
            ${presets.length === 0 && html`<div style="text-align:center;padding:18px 0;color:var(--dim);font-size:12px;line-height:1.6">Nog geen maaltijden opgeslagen.<br/>Maak er een via "+ Nieuw".</div>`}
            ${presets.map((preset, idx) => {
              const totalKcal = preset.items.reduce((a, i) => a + i.calorieën, 0);
              const totalP = preset.items.reduce((a, i) => a + i.eiwitten, 0);
              return html`
                <div style="display:flex;align-items:center;gap:10px;padding:9px 0;${idx < presets.length-1 ? 'border-bottom:1px solid var(--border)' : ''}">
                  <div style="width:36px;height:36px;border-radius:10px;background:#85b0981a;border:1px solid #85b09830;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px">🍽</div>
                  <div style="flex:1;min-width:0">
                    <div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${preset.naam}</div>
                    <div style="font-size:10px;color:var(--muted);margin-top:2px;font-family:'JetBrains Mono',monospace">${Math.round(totalKcal)} kcal · E ${Math.round(totalP)}g · ${preset.items.length} items</div>
                  </div>
                  <button onClick=${() => handleLoadPreset(preset)} style="flex-shrink:0;background:#85b0981a;color:var(--p);border:1px solid #85b09840;border-radius:8px;padding:6px 12px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap"
                    onMouseOver=${e => { e.currentTarget.style.background='var(--p)'; e.currentTarget.style.color='var(--bg)'; }}
                    onMouseOut=${e => { e.currentTarget.style.background='#85b0981a'; e.currentTarget.style.color='var(--p)'; }}>+ Log</button>
                  <button onClick=${() => handleDeletePreset(idx)} style="flex-shrink:0;background:none;border:none;color:var(--dim);cursor:pointer;font-size:17px;line-height:1;padding:4px;transition:color .15s"
                    onMouseOver=${e => e.currentTarget.style.color='var(--danger)'}
                    onMouseOut=${e => e.currentTarget.style.color='var(--dim)'}>×</button>
                </div>`;
            })}
          </div>`}

          ${libTab === 'producten' && html`<div>
            ${customProducts.length === 0 && html`<div style="text-align:center;padding:18px 0;color:var(--dim);font-size:12px;line-height:1.6">Nog geen eigen producten.<br/>Voeg er een toe via "+ Nieuw".</div>`}
            ${customProducts.map((p, idx) => html`
              <div style="display:flex;align-items:center;gap:10px;padding:9px 0;${idx < customProducts.length-1 ? 'border-bottom:1px solid var(--border)' : ''}">
                <div style="width:36px;height:36px;border-radius:10px;background:#7fa4b81a;border:1px solid #7fa4b830;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px">📦</div>
                <div style="flex:1;min-width:0">
                  <div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.naam}</div>
                  <div style="font-size:10px;color:var(--muted);margin-top:2px;font-family:'JetBrains Mono',monospace">${Math.round(p.calorieën)} kcal · E ${Math.round(p.eiwitten)}g · K ${Math.round(p.koolhydraten)}g · V ${Math.round(p.vetten)}g</div>
                </div>
                <button onClick=${() => addItems([{ naam: p.naam, hoeveelheid: '100g', calorieën: p.calorieën, eiwitten: p.eiwitten, koolhydraten: p.koolhydraten, vetten: p.vetten }])}
                  style="flex-shrink:0;background:#7fa4b81a;color:var(--c);border:1px solid #7fa4b840;border-radius:8px;padding:6px 12px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap"
                  onMouseOver=${e => { e.currentTarget.style.background='var(--c)'; e.currentTarget.style.color='var(--bg)'; }}
                  onMouseOut=${e => { e.currentTarget.style.background='#7fa4b81a'; e.currentTarget.style.color='var(--c)'; }}>+ Log</button>
                <button onClick=${() => deleteCustomProduct(p.id)} style="flex-shrink:0;background:none;border:none;color:var(--dim);cursor:pointer;font-size:17px;line-height:1;padding:4px;transition:color .15s"
                  onMouseOver=${e => e.currentTarget.style.color='var(--danger)'}
                  onMouseOut=${e => e.currentTarget.style.color='var(--dim)'}>×</button>
              </div>`)}
          </div>`}
        </div>

        <hr class="divider"/>

        <!-- Log -->
        ${log.length > 0 && html`
          <div>
            <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px">
              <div style="font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.04em;text-transform:uppercase">Vandaag · ${log.length} item${log.length!==1?'s':''}</div>
              <div class="mono" style="font-size:11px;color:var(--muted)">${Math.round(totals.calorieën)} kcal</div>
            </div>
            ${[...log].reverse().map(item => html`<${LogCard} key=${item.id} item=${item} onRemove=${()=>setLog(p=>p.filter(i=>i.id!==item.id))}/>`)}
          </div>`}
        ${log.length===0 && html`<div style="text-align:center;color:var(--border);padding:44px 20px;font-size:13px"><div style="font-size:30px;margin-bottom:10px">🍽</div>Nog niets gelogd vandaag</div>`}
      </div>`}

      ${tab==='workout' && html`<div>
        <!-- Mijn workouts -->
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
          <div style="font-size:13px;font-weight:600;color:var(--muted);letter-spacing:.04em;text-transform:uppercase">Mijn workouts</div>
          <button onClick=${() => { setEditingWorkout(null); setShowWorkoutBuilder(true); }}
            style="background:var(--p);color:var(--bg);border:none;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;transition:opacity .15s"
            onMouseOver=${e => e.currentTarget.style.opacity='.8'}
            onMouseOut=${e => e.currentTarget.style.opacity='1'}>
            + Nieuwe workout
          </button>
        </div>
        ${workouts.length === 0 && html`<div style="text-align:center;color:var(--border);padding:32px 20px;font-size:13px"><div style="font-size:30px;margin-bottom:10px">🏋️</div>Nog geen workouts opgeslagen</div>`}
        ${workouts.map(w => html`<${WorkoutCard} key=${w.id} workout=${w} onDelete=${handleDeleteWorkout} onEdit=${(workout) => { setEditingWorkout(workout); setShowWorkoutBuilder(true); }} onLog=${handleLogWorkout} loadingAnalysis=${analysisLoading[w.id]} analysisError=${analysisErrors[w.id]} />`)}
                <!-- Eigen oefeningen bibliotheek -->
        <div class="card" style="margin-top:8px;border-top:2px solid #85b09835">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
            <div>
              <div class="section-label" style="color:var(--p);margin-bottom:2px">Eigen oefeningen</div>
              <div style="font-size:11px;color:var(--dim)">Voeg je eigen oefeningen toe met een foto</div>
            </div>
            <button onClick=${() => setShowAddExercise(true)}
              style="flex-shrink:0;background:var(--p);color:var(--bg);border:none;border-radius:8px;padding:6px 12px;font-size:11px;font-weight:700;cursor:pointer;transition:opacity .15s"
              onMouseOver=${e => e.currentTarget.style.opacity='.8'}
              onMouseOut=${e => e.currentTarget.style.opacity='1'}>
              + Nieuw
            </button>
          </div>

          ${customExercises.length === 0 && html`
            <div style="text-align:center;padding:20px 0;color:var(--dim);font-size:12px;line-height:1.7">
              Nog geen eigen oefeningen.<br/>
              Voeg ze toe en gebruik ze in je workouts.
            </div>`}

          ${customExercises.map((ex, i) => html`
            <div style="display:flex;align-items:center;gap:12px;padding:10px 0;${i < customExercises.length-1 ? 'border-bottom:1px solid var(--border)' : ''}">
              ${ex.images?.[0]
                ? html`<img src=${ex.images[0]} style="width:52px;height:52px;object-fit:cover;border-radius:8px;flex-shrink:0;border:1px solid var(--border)"/>`
                : html`<div style="width:52px;height:52px;border-radius:8px;background:var(--s2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">💪</div>`}
              <div style="flex:1;min-width:0">
                <div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${ex.name}</div>
                <div style="font-size:10px;color:var(--p);margin-top:2px">Eigen oefening · ${ex.images?.[0] ? 'met foto' : 'zonder foto'}</div>
              </div>
              <button onClick=${() => handleDeleteCustomExercise(ex.id)}
                style="flex-shrink:0;background:none;border:none;color:var(--dim);cursor:pointer;font-size:17px;line-height:1;padding:4px;transition:color .15s"
                onMouseOver=${e => e.currentTarget.style.color='var(--danger)'}
                onMouseOut=${e => e.currentTarget.style.color='var(--dim)'}>×</button>
            </div>`)}
        </div>
      </div>`}

      ${tab==='settings' && html`<div>
        <div class="card">
          <div style="font-size:12px;font-weight:600;color:#888;margin-bottom:10px">Gemini API Key</div>
          <div style="display:flex;align-items:center;gap:8px;padding:9px 11px;border-radius:9px;margin-bottom:12px;background:${key?'#85b0981a':'#b872721a'};border:1px solid ${key?'#85b09840':'#b8727240'}">
            <span style="width:7px;height:7px;border-radius:50%;background:${key?'var(--p)':'var(--danger)'};flex-shrink:0"/>
            <span style="font-size:12px;color:${key?'var(--p)':'var(--danger)'}">${key ? 'API key opgeslagen — AI kan voedingswaarden schatten' : 'Geen API key — AI-schatting werkt niet'}</span>
          </div>
          <input type="password" value=${key} onInput=${e=>setKeyState(e.target.value)} placeholder="AIza..." class="field" style="margin-bottom:10px"/>
          <button class=${'btn'+(kSaved?' success':'')} onClick=${()=>{ setKey(key); setKSaved(true); setTimeout(()=>setKSaved(false),2000); }}>${kSaved ? '✓ Opgeslagen' : 'API key opslaan'}</button>
          <div style="font-size:11px;color:var(--muted);margin-top:8px;line-height:1.6">Gratis key via <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com/apikey</a></div>
        </div>

        <div class="card">
          <div style="font-size:12px;font-weight:600;color:#888;margin-bottom:12px">Dagelijkse doelen</div>
          ${[['calorieën','Calorieën (kcal)'],['eiwitten','Eiwitten (g)'],['koolhydraten','Koolhydraten (g)'],['vetten','Vetten (g)']].map(([k,lbl])=>html`
            <div style="margin-bottom:12px">
              <div style="font-size:11px;color:var(--muted);margin-bottom:5px">${lbl}</div>
              <input type="number" value=${gDraft[k]} onInput=${e=>setGDraft(p=>({...p,[k]:Number(e.target.value)}))} class="field mono"/>
            </div>`)}
          <button class=${'btn'+(gSaved?' success':'')} onClick=${()=>{ setGoals(gDraft); jset('ct_goals',gDraft); setGSaved(true); setTimeout(()=>setGSaved(false),2000); }}>${gSaved ? '✓ Opgeslagen' : 'Doelen opslaan'}</button>
        </div>

        <div class="card">
          <div style="font-size:12px;font-weight:600;color:#888;margin-bottom:12px">API-gebruik (Gemini)</div>
          ${(() => {
            const stats = rateLimitTracker.getStats();
            const totalRPD = Object.values(stats.rpd).reduce((a,b)=>a+b,0);
            const totalTPM = Object.values(stats.tpm).reduce((a,b)=>a+b,0);
            const totalRPM = Object.values(stats.rpm).reduce((a,b)=>a+b,0);
            const maxRPD = 1500, maxTPM = 1000000, maxRPM = 10;
            const barStyle = (used, max) => { const pct = Math.min(used / max * 100, 100); const over = used >= max; return `width:${pct}%;height:100%;background:${over?'var(--danger)':'var(--c)'};border-radius:6px;transition:width .3s`; };
            return html`
              ${[['Verzoeken vandaag', totalRPD, maxRPD],['Tokens deze minuut', totalTPM, maxTPM],['Verzoeken deze minuut', totalRPM, maxRPM]].map(([label, used, max]) => html`
                <div style="margin-bottom:14px">
                  <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:4px">
                    <span>${label}</span><span class="mono">${used.toLocaleString()} / ${max.toLocaleString()}</span>
                  </div>
                  <div style="background:var(--s2);border-radius:6px;height:4px;overflow:hidden"><div style="${barStyle(used, max)}"/></div>
                </div>`)}
              <div style="font-size:10px;color:var(--dim);line-height:1.4">Gebaseerd op lokale telling. Limieten kunnen afwijken.</div>`;
          })()}
          <button class="btn" onClick=${() => { rateLimitTracker.reset(); setUsageTick(t => t+1); }} style="margin-top:12px;background:var(--dim);color:var(--text);border:1px solid var(--border)">Lokale tellers resetten</button>
        </div>

        <div class="card">
          <div style="font-size:12px;font-weight:600;color:#888;margin-bottom:12px">Cloudflare Worker gebruik</div>
          ${(() => {
            const cf = getCFUsage();
            const used = cf.count || 0;
            const max = 100000;
            const pct = Math.min(used / max * 100, 100);
            const over = used >= max;
            return html`
              <div style="margin-bottom:8px">
                <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:4px">
                  <span>Zoekopdrachten vandaag</span><span class="mono" style="color:${over?'var(--danger)':'var(--text)'}">${used.toLocaleString()} / ${max.toLocaleString()}</span>
                </div>
                <div style="background:var(--s2);border-radius:6px;height:4px;overflow:hidden"><div style="width:${pct}%;height:100%;background:${over?'var(--danger)':'var(--c)'};border-radius:6px"/></div>
              </div>
              <div style="font-size:10px;color:var(--dim);line-height:1.4">Gratis limiet via Cloudflare Workers: 100.000 per dag.</div>
              <button class="btn" onClick=${() => { localStorage.removeItem(CF_USAGE_KEY); setUsageTick(t => t+1); }} style="margin-top:12px;background:var(--dim);color:var(--text);border:1px solid var(--border)">Teller resetten</button>`;
          })()}
        </div>

        <div class="card">
          <div style="font-size:12px;font-weight:600;color:#888;margin-bottom:12px">Zoekresultaten</div>
          <div style="font-size:11px;color:var(--dim);margin-bottom:10px;line-height:1.4">Maximaal aantal producten dat wordt opgehaald uit de database.</div>
          <input type="number" value=${maxResults} onInput=${e => setMaxResults(Math.max(1, Math.min(200, Number(e.target.value) || 50)))} min="1" max="200" class="field mono" style="text-align:center;font-size:16px;font-weight:600"/>
          <div style="font-size:10px;color:var(--dim);margin-top:6px">Tussen 1 en 200 (standaard 50)</div>
        </div>

        <div class="card">
          <div style="font-size:12px;font-weight:600;color:#888;margin-bottom:10px">Opslag info</div>
          <div style="font-size:11px;color:var(--dim);line-height:1.6">
            Eigen oefeningen (met foto's) worden lokaal opgeslagen in je browser. Foto's worden automatisch verkleind tot max 500px voor efficiënte opslag.<br/><br/>
            <span style="color:var(--muted)">${customExercises.length} eigen oefening${customExercises.length !== 1 ? 'en' : ''} opgeslagen.</span>
          </div>
        </div>
      </div>`}

      ${tab==='progress' && html`
        <div>
          <div style="display:flex; gap:6px; margin-bottom:16px">
            <button onClick=${() => setProgressView('voeding')} style="padding:5px 12px; border-radius:20px; font-size:11px; font-weight:600; cursor:pointer; border:1px solid ${progressView==='voeding'?'var(--p)':'var(--border)'}; background:${progressView==='voeding'?'var(--p)':'transparent'}; color:${progressView==='voeding'?'var(--bg)':'var(--muted)'}">Voeding</button>
            <button onClick=${() => setProgressView('gym')} style="padding:5px 12px; border-radius:20px; font-size:11px; font-weight:600; cursor:pointer; border:1px solid ${progressView==='gym'?'var(--c)':'var(--border)'}; background:${progressView==='gym'?'var(--c)':'transparent'}; color:${progressView==='gym'?'var(--bg)':'var(--muted)'}">Gym</button>
          </div>
          ${progressView==='voeding' && html`<${NutritionChart}/>`}
          ${progressView==='gym' && html`<${GymChart} workouts=${workouts}/>`}
        </div>`}
    </div>
  </div>`;
}

render(html`<${App}/>`, document.getElementById('app'));
  </script>
</body>
</html>
